<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Maya Civilisation · Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
  /* ── LIQUID GLASS — CLEAN WHITE/GREY ── */
  --bg:         linear-gradient(160deg,#ffffff 0%,#f2f2f4 60%,#e8e8ec 100%);
  --surface:    rgba(255,255,255,0.82);
  --surface2:   rgba(248,248,250,0.9);
  --border:     rgba(255,255,255,0.95);
  --border2:    rgba(0,0,0,0.09);
  --shadow:     0 4px 24px rgba(0,0,0,0.08),0 1px 4px rgba(0,0,0,0.04),inset 0 1px 0 rgba(255,255,255,0.95);
  --shadow-sm:  0 2px 12px rgba(0,0,0,0.06),inset 0 1px 0 rgba(255,255,255,0.9);
  --blur:       blur(24px) saturate(160%);
  --blur-hdr:   blur(40px) saturate(180%);
  --text:       #ffffff;
  --text2:      #ffffff;
  --text3:      rgba(0,0,0,0.4);
  --gold:       #b8921e;
  --gold-lt:    #d4a830;
  --gold-bg:    rgba(184,146,30,0.5);
  --btn-bg:     #1c1c1e;
  --btn-text:   #ffffff;
  --btn-radius: 10px;
  --radius:     14px;
  --radius-sm:  8px;
  --radius-pill:100px;

    --gold:    #c9a84c;
    --gold-lt: #e9c46a;
    --stone:   #3d2b1f;
    --stone-dk:#140a04;
    --cream:   #f5edd6;
    --sand:    #e8d5b0;
    --jade:    #2d6a4f;
    --jade-lt: #40916c;
    --terra:   #c1440e;
    --pakal:   #e9c46a;
    --saxon:   #7aaed6;
    --saxon-dk:#1a3a52;
    --islam:   #b07ed4;
    --islam-dk:#2d1445;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Crimson Pro', Georgia, serif;
    background:var(--bg);color:var(--text);
    user-select: none; -webkit-user-select: none;
  }

  .page { display: grid; grid-template-rows: auto 1fr auto auto auto; height: 100dvh; min-height: -webkit-fill-available; }

  /* ── HEADER ── */
  header {
    background: linear-gradient(180deg, #0d0604 0%, rgba(13,6,4,.8) 100%);
    border-bottom: 2px solid var(--gold);
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    z-index: 10; flex-wrap: wrap; flex-shrink: 0;
  }
  .hdr-left .eyebrow {
    font-family: 'Cinzel', serif; font-size: .55rem;
    letter-spacing: .18em; color: var(--gold); text-transform: uppercase; margin-bottom: 2px;
  }
  .hdr-left h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(.9rem, 2.2vw, 1.4rem);
    font-weight: 700; color:var(--gold); letter-spacing: .04em;
  }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: .65rem; font-style: italic; color:var(--text2); white-space: nowrap; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .leg-dot.general { background: var(--jade-lt); }
  .leg-dot.pakal   { background: var(--pakal); box-shadow: 0 0 7px var(--pakal); }
  .leg-dot.decline { background: var(--terra); }
  .leg-dot.saxon   { background: var(--saxon); }
  .leg-dot.islam   { background: var(--islam); }

  /* ── VIEWPORT ── */
  .timeline-viewport {
    overflow: hidden; position: relative; cursor: grab;
  }
  .timeline-viewport.grabbing { cursor: grabbing; }
  .timeline-viewport::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 15% 60%, rgba(45,106,79,.14) 0%, transparent 45%),
      radial-gradient(ellipse at 75% 25%, rgba(201,168,76,.09) 0%, transparent 40%),
      radial-gradient(ellipse at 55% 85%, rgba(193,68,14,.07) 0%, transparent 35%);
  }

  /* ── CANVAS ── */
  .timeline-canvas { position: relative; height: 100%; }

  /* ── SPINE ── */
  .spine {
    position: absolute; left: 0; height: 3px;
    background: linear-gradient(90deg,
      transparent 0%, rgba(201,168,76,.25) 2%,
      rgba(201,168,76,.65) 8%, rgba(201,168,76,.65) 92%,
      rgba(201,168,76,.25) 98%, transparent 100%);
    transform: translateY(-50%); pointer-events: none;
  }

  /* ── ERA BANDS ── */
  .era-band {
    position: absolute; top: 0; bottom: 0;
    border-left: 1px dashed rgba(201,168,76,.12); pointer-events: none;
  }
  .era-label {
    position: absolute; top: 14px;
    font-family: 'Cinzel', serif; font-size: .58rem; letter-spacing: .15em;
    color: rgba(201,168,76,.3); text-transform: uppercase; white-space: nowrap; padding-left: 8px;
  }

  /* ── EVENTS ── */
  .event {
    position: absolute; display: flex; flex-direction: column; align-items: center;
    cursor: pointer; transition: filter .18s;
  }
  .event:hover { filter: brightness(1.25); z-index: 5; }
  .event.above { flex-direction: column; }
  .event.below { flex-direction: column-reverse; }

  .event-line {
    width: 1px; flex-shrink: 0;
    background: rgba(201,168,76,.3); transition: background .18s;
  }
  .event:hover .event-line { background: var(--gold); }

  .event-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--stone-dk); flex-shrink: 0;
    transition: transform .18s; z-index: 2;
  }
  .event:hover .event-dot { transform: scale(1.5); }
  .event.general .event-dot { background: var(--jade-lt); }
  .event.pakal   .event-dot { background: var(--pakal); box-shadow: 0 0 10px rgba(233,196,106,.7); }
  .event.decline .event-dot { background: var(--terra); }
  .event.saxon   .event-dot { background: var(--saxon); box-shadow: 0 0 8px rgba(122,174,214,.5); }
  .event.islam   .event-dot { background: var(--islam); box-shadow: 0 0 8px rgba(176,126,212,.5); }

  /* ── CARD ── */
  .event-card {
    width: 200px;
    background: rgba(16,8,3,.9);
    border-radius: 9px;
    border: 1px solid rgba(201,168,76,.2);
    overflow: hidden;
    transition: border-color .18s, box-shadow .18s;
    backdrop-filter: blur(6px);
  }
  .event.pakal   .event-card { border-color: rgba(233,196,106,.45); box-shadow: 0 0 16px rgba(233,196,106,.12); }
  .event.decline .event-card { border-color: rgba(193,68,14,.35); }
  .event.saxon   .event-card { border-color: rgba(122,174,214,.4); background: rgba(10,20,32,.92); }
  .event.islam   .event-card { border-color: rgba(176,126,212,.4); background: rgba(18,8,28,.92); }
  .event:hover   .event-card { border-color: var(--gold); box-shadow: 0 6px 24px rgba(201,168,76,.22); }
  .event.saxon:hover .event-card { border-color: var(--saxon); box-shadow: 0 6px 24px rgba(122,174,214,.3); }
  .event.islam:hover .event-card { border-color: var(--islam); box-shadow: 0 6px 24px rgba(176,126,212,.3); }
  .event.pakal:hover .event-card { box-shadow: 0 6px 28px rgba(233,196,106,.32); }

  .card-img {
    width: 100%; height: 100px; object-fit: cover;
    display: block; border-bottom: 1px solid rgba(201,168,76,.15);
    background:rgba(255,255,255,0.45);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  }
  .card-img-placeholder {
    width: 100%; height: 100px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; background:rgba(255,255,255,0.88);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
    border-bottom: 1px solid rgba(201,168,76,.15);
  }
  .card-body { padding: 9px 11px; }
  .card-date {
    font-family: 'Cinzel', serif; font-size: .58rem; letter-spacing: .1em;
    margin-bottom: 3px;
  }
  .event.general .card-date { color: var(--jade-lt); }
  .event.pakal   .card-date { color: var(--pakal); }
  .event.decline .card-date { color: var(--terra); }
  .event.saxon   .card-date { color: var(--saxon); }
  .event.islam   .card-date { color: var(--islam); }
  .card-title {
    font-family: 'Cinzel', serif; font-size: .7rem; font-weight: 600;
    color:var(--text); line-height: 1.25;
  }
  .event.pakal .card-title { color:var(--gold); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(6,3,1,.8);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .25s;
    backdrop-filter: blur(4px); padding: 20px;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }

  .modal {
    background: linear-gradient(145deg, #2a1508 0%, #180c04 100%);
    border: 1px solid var(--gold); border-radius: 14px;
    max-width: 560px; width: 100%; position: relative;
    box-shadow: 0 24px 70px rgba(0,0,0,.8);
    transform: translateY(24px) scale(.97);
    transition: transform .28s cubic-bezier(.34,1.4,.64,1);
    overflow: hidden;
    max-height: 90vh; display: flex; flex-direction: column;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-content { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .modal.pakal-modal  { border-color: var(--pakal); box-shadow: 0 24px 70px rgba(0,0,0,.8), 0 0 40px rgba(233,196,106,.18); }
  .modal.decline-modal { border-color: var(--terra); }
  .modal.saxon-modal  { border-color: var(--saxon); box-shadow: 0 24px 70px rgba(0,0,0,.8), 0 0 30px rgba(122,174,214,.15); background: linear-gradient(145deg, #0e1e2e 0%, #08121c 100%); }
  .modal.islam-modal  { border-color: var(--islam); box-shadow: 0 24px 70px rgba(0,0,0,.8), 0 0 30px rgba(176,126,212,.15); background: linear-gradient(145deg, #1a0e28 0%, #0f0818 100%); }

  .modal-hero {
    width: 100%; height: 200px; object-fit: cover; display: block;
    border-bottom: 1px solid rgba(201,168,76,.2);
    background:rgba(255,255,255,0.5);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  }
  .modal-hero-placeholder {
    width: 100%; height: 200px;
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem; background:rgba(255,255,255,0.45);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
    border-bottom: 1px solid rgba(201,168,76,.2);
  }
  .modal-content { padding: 22px 26px 26px; }
  .modal-eyebrow {
    font-family: 'Cinzel', serif; font-size: .6rem; letter-spacing: .18em;
    text-transform: uppercase; margin-bottom: 5px;
  }
  .modal-eyebrow.general { color: var(--jade-lt); }
  .modal-eyebrow.pakal   { color: var(--pakal); }
  .modal-eyebrow.decline { color: var(--terra); }
  .modal-eyebrow.saxon   { color: var(--saxon); }
  .modal-eyebrow.islam   { color: var(--islam); }
  .modal-date { font-family: 'Cinzel', serif; font-size: 1rem; color:var(--gold); margin-bottom: 4px; }
  .modal-title {
    font-family: 'Cinzel', serif; font-size: 1.35rem; font-weight: 700;
    color:var(--text); line-height: 1.2; margin-bottom: 14px;
  }
  .modal.pakal-modal .modal-title { color:var(--gold); }
  .modal-body { font-size: .98rem; line-height: 1.72; color:var(--text2); }
  .modal-caption {
    margin-top: 10px; font-size: .72rem; font-style: italic;
    color: rgba(232,213,176,.4);
  }
  .modal-close {
    position: absolute; top: 10px; right: 12px;
    background: rgba(0,0,0,.6); border: 1px solid rgba(201,168,76,.35);
    color:var(--text2); border-radius: 5px; padding: 8px 14px;
    cursor: pointer; font-family: 'Cinzel', serif; font-size: .6rem;
    letter-spacing: .1em; transition: all .2s; z-index: 10;
    touch-action: manipulation; min-height: 36px;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-close:active { border-color: var(--gold); color:var(--gold); }

  /* curiosity button inside main Maya modal */
  .modal-curiosity-btn {
    font-family: 'Cinzel', serif; font-size: .68rem; letter-spacing: .1em;
    text-transform: uppercase; padding: 11px 24px; border: none; border-radius: 5px;
    cursor: pointer; width: 100%;
    background: linear-gradient(135deg, var(--jade) 0%, var(--jade-lt) 100%);
    color:var(--text); box-shadow: 0 3px 12px rgba(45,106,79,.35);
    transition: all .2s;
  }
  .modal-curiosity-btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(45,106,79,.45); }
  .modal-curiosity-btn:disabled { opacity: .5; cursor: default; transform: none; }
  .modal-curiosity-feedback { font-size: .78rem; font-style: italic; color: var(--jade-lt); margin-top: 8px; min-height: 1.2em; }

  /* ── FOOTER ── */
  footer {
    background: rgba(0,0,0,.55); border-top: 1px solid rgba(201,168,76,.18);
    padding: 6px 12px; display: flex; align-items: center;
    justify-content: space-between; gap: 6px; z-index: 10;
    flex-shrink: 0;
  }
  .hint { display: none; } /* hidden on small screens — not needed on touch */
  .minimap-row { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
  .minimap-track {
    flex: 1; max-width: 180px; height: 5px; background: rgba(201,168,76,.14);
    border-radius: 3px; position: relative; cursor: pointer; touch-action: none;
  }
  .minimap-thumb { position: absolute; top: 0; height: 100%; background: var(--gold); border-radius: 3px; transition: left .08s, width .08s; }
  .era-now { font-size: .6rem; font-style: italic; color: rgba(232,213,176,.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 90px; }
  .nav-btns { display: flex; gap: 4px; }
  .nav-btn {
    font-family: 'Cinzel', serif; font-size: .6rem; letter-spacing: .05em;
    text-transform: uppercase; padding: 10px 12px;
    background: rgba(255,255,255,.05); border: 1px solid rgba(201,168,76,.3);
    color:var(--text2); border-radius: 6px; cursor: pointer; transition: all .15s;
    touch-action: manipulation; min-height: 42px; white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:active { background: rgba(201,168,76,.18); border-color: var(--gold); color:var(--gold); }
  .zoom-btn { min-width: 42px; padding: 10px; font-size: 1.15rem; font-family: monospace; letter-spacing: 0; }

  /* ── CENTURY NOTCHES ── */
  .notch {
    position: absolute; pointer-events: none;
    display: flex; flex-direction: column; align-items: center;
    transform: translateX(-50%);
  }
  .notch-line {
    width: 1px; background: rgba(150,122,51,.35);
  }
  .notch-line.major { background: rgba(150,122,51,.55); }
  .notch-label {
    font-family: 'Cinzel', serif; font-size: .55rem;
    letter-spacing: .06em; color: rgba(150,122,51,.55);
    white-space: nowrap; margin-top: 3px;
  }
  .notch-label.major { color: rgba(150,122,51,.8); font-size: .6rem; }

  /* ── CONTEXT RIBBON ── */
  .ribbon {
    position: relative; z-index: 9;
    background: rgba(0,0,0,.55);
    border-top: 1px solid rgba(255,255,255,.08);
    overflow: hidden;
    flex-shrink: 0;
  }
  .ribbon-row {
    position: relative;
    height: 32px; /* bigger tap target */
    overflow: hidden;
  }
  .ribbon-row + .ribbon-row {
    border-top: 1px solid rgba(255,255,255,.06);
  }
  .ribbon-canvas {
    position: absolute; top: 0; left: 0;
    height: 100%;
    pointer-events: none;
  }
  .ribbon-track-label {
    position: sticky; left: 0; z-index: 3;
    display: inline-flex; align-items: center;
    font-family: 'Cinzel', serif; font-size: .55rem; letter-spacing: .1em;
    text-transform: uppercase; padding: 0 10px;
    background: rgba(0,0,0,.8);
    height: 100%;
    white-space: nowrap; pointer-events: none;
    border-right: 1px solid rgba(255,255,255,.1);
    min-width: 110px;
  }
  .ribbon-row.saxon .ribbon-track-label { color: rgba(122,174,214,.8); }
  .ribbon-row.islam .ribbon-track-label { color: rgba(176,126,212,.8); }

  .ribbon-chip {
    position: absolute; top: 50%; transform: translateY(-50%);
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 9px;
    border-radius: 20px; border: 1px solid transparent;
    cursor: pointer; white-space: nowrap;
    transition: all .2s; pointer-events: auto;
    font-family: 'Cinzel', serif;
    touch-action: manipulation;
    min-height: 24px; /* ensure tapable */
  }
  .ribbon-row.saxon .ribbon-chip {
    color: var(--saxon); border-color: rgba(122,174,214,.35);
    background: rgba(122,174,214,.1);
  }
  .ribbon-row.islam .ribbon-chip {
    color: var(--islam); border-color: rgba(176,126,212,.35);
    background: rgba(176,126,212,.1);
  }
  .ribbon-row.saxon .ribbon-chip:hover { background: rgba(122,174,214,.25); border-color: var(--saxon); }
  .ribbon-row.islam .ribbon-chip:hover { background: rgba(176,126,212,.25); border-color: var(--islam); }
  .ribbon-chip.expanded {
    background: rgba(0,0,0,.75) !important;
    z-index: 5; border-color: currentColor !important;
  }

  .chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .ribbon-row.saxon .chip-dot { background: var(--saxon); }
  .ribbon-row.islam .chip-dot { background: var(--islam); }

  .chip-date { font-size: .55rem; letter-spacing: .05em; }
  .chip-title {
    font-size: .55rem; letter-spacing: .03em;
    max-width: 0; overflow: hidden;
    transition: max-width .3s ease, opacity .3s ease, margin .3s ease;
    opacity: 0; margin-left: 0;
  }
  .ribbon-chip.expanded .chip-title { max-width: 200px; opacity: 1; margin-left: 3px; }

  /* ── CURIOSITY MODAL ── */
  .curiosity-overlay {
    position: fixed; inset: 0; background: rgba(6,3,1,.75);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .22s;
    backdrop-filter: blur(4px); padding: 20px;
  }
  .curiosity-overlay.open { opacity: 1; pointer-events: auto; }

  .curiosity-modal {
    background: linear-gradient(145deg, #1a1226 0%, #0e0818 100%);
    border: 1px solid var(--islam); border-radius: 12px;
    max-width: 480px; width: 100%; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,.8), 0 0 30px rgba(176,126,212,.12);
    transform: translateY(20px) scale(.97);
    transition: transform .25s cubic-bezier(.34,1.4,.64,1);
    overflow: hidden; max-height: 88vh;
    display: flex; flex-direction: column;
  }
  .cm-body { padding: 16px 20px 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .cm-close {
    position: absolute; top: 8px; right: 10px;
    background: rgba(0,0,0,.6); border: 1px solid rgba(255,255,255,.2);
    color:var(--text2); border-radius: 5px; padding: 8px 12px;
    cursor: pointer; font-family: 'Cinzel', serif; font-size: .6rem;
    letter-spacing: .1em; z-index: 10; transition: all .2s;
    touch-action: manipulation; min-height: 36px;
    -webkit-tap-highlight-color: transparent;
  }
  .cm-close:active { border-color: var(--gold); color:var(--gold); }
  .curiosity-modal.saxon-cm {
    background: linear-gradient(145deg, #0e1e2e 0%, #08121c 100%);
    border-color: var(--saxon);
    box-shadow: 0 20px 60px rgba(0,0,0,.8), 0 0 30px rgba(122,174,214,.12);
  }
  .curiosity-overlay.open .curiosity-modal { transform: translateY(0) scale(1); }

  .cm-hero { width: 100%; height: 140px; object-fit: cover; display: block; flex-shrink: 0; }
  .cm-hero-placeholder {
    width: 100%; height: 140px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; background:rgba(255,255,255,0.45);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  }
  .cm-eyebrow {
    font-family: 'Cinzel', serif; font-size: .58rem; letter-spacing: .16em;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .cm-eyebrow.saxon { color: var(--saxon); }
  .cm-eyebrow.islam { color: var(--islam); }
  .cm-date { font-family: 'Cinzel', serif; font-size: .9rem; color:var(--gold); margin-bottom: 3px; }
  .cm-title {
    font-family: 'Cinzel', serif; font-size: 1.15rem; font-weight: 700;
    color:var(--text); line-height: 1.2; margin-bottom: 10px;
  }
  .cm-text { font-size: .9rem; line-height: 1.65; color:var(--text2); margin-bottom: 16px; }

  .cm-divider {
    border: none; border-top: 1px solid rgba(255,255,255,.08); margin-bottom: 14px;
  }
  .cm-cta-label {
    font-family: 'Cinzel', serif; font-size: .6rem; letter-spacing: .14em;
    color: rgba(232,213,176,.45); text-transform: uppercase; margin-bottom: 8px;
  }
  .cm-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
  .cm-btn {
    font-family: 'Cinzel', serif; font-size: .65rem; letter-spacing: .1em;

// ── CONFIG ────────────────────────────────────────────────────────────
const MIN_YEAR   = -2200;
const MAX_YEAR   = 1900;
const PAD        = 260;
const SPINE_FRAC = 0.5;
const BASE_LINE  = 90;

const ZOOM_LEVELS = [0.18, 0.28, 0.42, 0.55, 0.75, 1.05, 1.4, 1.9];
let   zoomIdx     = 3; // default: 0.55 px/year
let   pxPerYear   = ZOOM_LEVELS[zoomIdx];

function totalW()     { return PAD * 2 + (MAX_YEAR - MIN_YEAR) * pxPerYear; }
function yearToX(y)   { return PAD + (y - MIN_YEAR) * pxPerYear; }

// ── BUILD ─────────────────────────────────────────────────────────────
function build() {
  const vp     = document.getElementById('viewport');
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  canvas.style.width = totalW() + 'px';

  const H      = vp.clientHeight;
  const spineY = H * SPINE_FRAC;

  // Spine
  const spine       = document.createElement('div');
  spine.className   = 'spine';
  spine.style.top   = spineY + 'px';
  spine.style.width = totalW() + 'px';
  canvas.appendChild(spine);

  // ── CENTURY NOTCHES ──
  // Show every 100 years; every 500 years is "major"
  const notchStep  = pxPerYear < 0.3 ? 500 : pxPerYear < 0.6 ? 200 : 100;
  const notchH     = 14;
  const notchHMaj  = 22;
  const firstNotch = Math.ceil(MIN_YEAR / notchStep) * notchStep;

  for (let yr = firstNotch; yr <= MAX_YEAR; yr += notchStep) {
    const major = yr % 500 === 0;
    const x     = yearToX(yr);
    const wrap  = document.createElement('div');
    wrap.className    = 'notch';
    wrap.style.left   = x + 'px';
    // Position so notch straddles the spine
    wrap.style.top    = (spineY - (major ? notchHMaj : notchH)) + 'px';

    const lh = (major ? notchHMaj : notchH) * 2;
    const label = yr < 0 ? `${Math.abs(yr)} BCE` : yr === 0 ? '0' : `${yr} CE`;

    wrap.innerHTML = `
      <div class="notch-line ${major ? 'major' : ''}" style="height:${lh}px"></div>
      <div class="notch-label ${major ? 'major' : ''}">${label}</div>`;
    canvas.appendChild(wrap);
  }

  // ── ERA BANDS ──
  ERAS.forEach((era, i) => {
    const x    = yearToX(era.start);
    const band = document.createElement('div');
    band.className   = 'era-band';
    band.style.left  = x + 'px';
    const nextX = i < ERAS.length - 1 ? yearToX(ERAS[i+1].start) : totalW();
    band.style.width = (nextX - x) + 'px';
    const lbl        = document.createElement('div');
    lbl.className    = 'era-label';
    lbl.textContent  = era.label;
    band.appendChild(lbl);
    canvas.appendChild(band);
  });

  // ── EVENTS ──
  EVENTS.forEach((ev, i) => {
    const x     = yearToX(ev.year);
    const above = i % 2 === 0;
    const lineH = BASE_LINE + (i % 4) * 20;

    const el         = document.createElement('div');
    el.className     = `event ${ev.type} ${above ? 'above' : 'below'}`;
    el.style.left    = (x - 100) + 'px';

    const imgEl = ev.img
      ? `<img class="card-img" src="${ev.img}" alt="${ev.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="card-img-placeholder" style="display:none">${ev.emoji}</div>`
      : `<div class="card-img-placeholder">${ev.emoji}</div>`;

    const card = `<div class="event-card">${imgEl}<div class="card-body">
      <div class="card-date">${ev.date}</div>
      <div class="card-title">${ev.title}</div></div></div>`;
    const line = `<div class="event-line" style="height:${lineH}px"></div>`;
    const dot  = `<div class="event-dot"></div>`;

    el.innerHTML = above ? card + line + dot : dot + line + card;
    if (above) el.style.bottom = (H - spineY + 6) + 'px';
    else       el.style.top    = (spineY + 6) + 'px';

    el.addEventListener('click', () => { if (!didDrag) openModal(ev); });
    canvas.appendChild(el);
  });
}

// ── SCROLL ────────────────────────────────────────────────────────────
let scrollX = 0, didDrag = false;

function setScroll(x) {
  const vp  = document.getElementById('viewport');
  const max = Math.max(0, totalW() - vp.clientWidth);
  scrollX   = Math.max(0, Math.min(max, x));
  document.getElementById('canvas').style.transform = `translateX(${-scrollX}px)`;
  syncRibbon();
  updateUI();
}
function scrollBy(dx) { setScroll(scrollX + dx); }

function updateUI() {
  const vp    = document.getElementById('viewport');
  const ratio = vp.clientWidth / totalW();
  const track = document.getElementById('minimap-track');
  const tw    = track.clientWidth;
  const thumb = document.getElementById('minimap-thumb');
  thumb.style.width = Math.max(14, ratio * tw) + 'px';
  thumb.style.left  = (scrollX / totalW() * tw) + 'px';

  const centreYear = MIN_YEAR + (scrollX + vp.clientWidth / 2 - PAD) / pxPerYear;
  let label = ERAS[0].label;
  for (const era of ERAS) { if (centreYear >= era.start) label = era.label; }
  document.getElementById('era-now').textContent = label;
}

// ── ZOOM ──────────────────────────────────────────────────────────────
function zoom(dir, anchorX) {
  const vp      = document.getElementById('viewport');
  // Anchor in year-space (default: centre of viewport)
  const ax      = anchorX !== undefined ? anchorX : scrollX + vp.clientWidth / 2;
  const anchorYear = MIN_YEAR + (ax - PAD) / pxPerYear;

  const newIdx  = Math.max(0, Math.min(ZOOM_LEVELS.length - 1, zoomIdx + dir));
  if (newIdx === zoomIdx) return;
  zoomIdx    = newIdx;
  pxPerYear  = ZOOM_LEVELS[zoomIdx];

  build();
  buildRibbon();
  // Keep the same year centred under the anchor point
  const newAnchorX = yearToX(anchorYear);
  setScroll(newAnchorX - (ax - scrollX));
}

// ── DRAG (mouse) ──────────────────────────────────────────────────────
let dragging = false, dragX0 = 0, scrollX0 = 0;
const vp = document.getElementById('viewport');

vp.addEventListener('mousedown', e => {
  dragging = true; didDrag = false;
  dragX0 = e.clientX; scrollX0 = scrollX;
  vp.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - dragX0;
  if (Math.abs(dx) > 5) didDrag = true;
  setScroll(scrollX0 - dx);
});
window.addEventListener('mouseup', () => { dragging = false; vp.classList.remove('grabbing'); });

// Mouse wheel zoom
vp.addEventListener('wheel', e => {
  e.preventDefault();
  const rect   = vp.getBoundingClientRect();
  const anchorX = scrollX + (e.clientX - rect.left);
  zoom(e.deltaY < 0 ? 1 : -1, anchorX);
}, { passive: false });

// ── TOUCH ─────────────────────────────────────────────────────────────
let tx0 = 0, sx0 = 0;
let pinching = false, pinchDist0 = 0, pinchScrollX0 = 0, pinchMidX0 = 0, pinchZoomIdx0 = 0;

function touchDist(t) {
  const dx = t[0].clientX - t[1].clientX;
  const dy = t[0].clientY - t[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}
function touchMidX(t) { return (t[0].clientX + t[1].clientX) / 2; }

vp.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    // Pinch start
    pinching     = true; didDrag = true;
    pinchDist0   = touchDist(e.touches);
    pinchMidX0   = touchMidX(e.touches);
    pinchScrollX0 = scrollX;
    pinchZoomIdx0 = zoomIdx;
  } else {
    pinching = false;
    tx0 = e.touches[0].clientX; sx0 = scrollX; didDrag = false;
  }
}, { passive: true });

vp.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinching) {
    // Pinch zoom — map distance ratio to zoom level
    const ratio    = touchDist(e.touches) / pinchDist0;
    const logRatio = Math.log2(ratio);
    const newIdx   = Math.max(0, Math.min(ZOOM_LEVELS.length-1,
                       Math.round(pinchZoomIdx0 + logRatio * 2)));
    if (newIdx !== zoomIdx) {
      const rect     = vp.getBoundingClientRect();
      const anchorX  = pinchScrollX0 + (pinchMidX0 - rect.left);
      const anchorYr = MIN_YEAR + (anchorX - PAD) / ZOOM_LEVELS[pinchZoomIdx0];
      zoomIdx   = newIdx;
      pxPerYear = ZOOM_LEVELS[zoomIdx];
      build();
      setScroll(yearToX(anchorYr) - (pinchMidX0 - rect.left));
    }
  } else if (!pinching) {
    const dx = e.touches[0].clientX - tx0;
    if (Math.abs(dx) > 8) didDrag = true;
    setScroll(sx0 - dx);
  }
}, { passive: true });

vp.addEventListener('touchend', e => {
  if (e.touches.length < 2) pinching = false;
}, { passive: true });

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') scrollBy(180);
  if (e.key === 'ArrowLeft')  scrollBy(-180);
  if (e.key === '+' || e.key === '=') zoom(+1);
  if (e.key === '-')          zoom(-1);
  if (e.key === 'Escape')     closeModal();
});

document.getElementById('minimap-track').addEventListener('click', e => {
  const r = e.currentTarget.getBoundingClientRect();
  setScroll((e.clientX - r.left) / r.width * totalW());
});

// ── MODAL ─────────────────────────────────────────────────────────────
function openModal(ev) {
  currentModalEvent = ev;
  const overlay = document.getElementById('modal-overlay');
  const modal   = document.getElementById('modal');
  modal.className = 'modal';
  if (ev.type === 'pakal')   modal.classList.add('pakal-modal');
  if (ev.type === 'decline') modal.classList.add('decline-modal');
  if (ev.type === 'saxon')   modal.classList.add('saxon-modal');
  if (ev.type === 'islam')   modal.classList.add('islam-modal');

  // Hero image
  const heroWrap = document.getElementById('modal-hero-wrap');
  if (ev.img) {
    heroWrap.innerHTML = `<img class="modal-hero" src="${ev.img}" alt="${ev.title}"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="modal-hero-placeholder" style="display:none">${ev.emoji}</div>`;
  } else {
    heroWrap.innerHTML = `<div class="modal-hero-placeholder">${ev.emoji}</div>`;
  }

  const ey = document.getElementById('modal-eyebrow');
  ey.className  = `modal-eyebrow ${ev.type}`;
  ey.textContent = ev.type === 'pakal'   ? '★ Pakal Votan & Palenque'
                 : ev.type === 'decline' ? '⚠ Maya Decline & Conquest'
                 : ev.type === 'saxon'   ? '⚔ Anglo-Saxon & Viking Britain'
                 : ev.type === 'islam'   ? '🌙 Golden Age of Islam'
                 : '◆ Maya Civilisation';

  document.getElementById('modal-date').textContent    = ev.date;
  document.getElementById('modal-title').textContent   = ev.title;
  document.getElementById('modal-body').textContent    = ev.detail;
  document.getElementById('modal-caption').textContent = ev.caption || '';

  // Show curiosity button only for Maya events (general, pakal, decline)
  const isMaya = ['general','pakal','decline'].includes(ev.type);
  const wrap = document.getElementById('modal-curiosity-wrap');
  const btn  = document.getElementById('modal-curiosity-btn');
  const fb   = document.getElementById('modal-curiosity-feedback');
  wrap.style.display        = isMaya ? 'block' : 'none';
  btn.disabled              = false;
  btn.textContent           = '★ I want to learn more about this!';
  fb.textContent            = '';

  overlay.classList.add('open');
}
function closeModal()       { document.getElementById('modal-overlay').classList.remove('open'); }
function overlayClick(e)    { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

// ── RIBBON ────────────────────────────────────────────────────────────
function buildRibbon() {
  const saxonCanvas = document.getElementById('ribbon-canvas-saxon');
  const islamCanvas = document.getElementById('ribbon-canvas-islam');
  saxonCanvas.innerHTML = '';
  islamCanvas.innerHTML = '';

  const w = totalW();
  saxonCanvas.style.width = w + 'px';
  islamCanvas.style.width = w + 'px';

  function addChips(canvas, evList) {
    evList.forEach(ev => {
      const x    = yearToX(ev.year);
      const chip = document.createElement('div');
      chip.className = 'ribbon-chip';
      chip.style.left = (x - 30) + 'px'; // centre chip on year
      chip.innerHTML  = `<span class="chip-dot"></span>
        <span class="chip-date">${ev.date}</span>
        <span class="chip-title">${ev.title}</span>`;

      chip.addEventListener('click', e => {
        e.stopPropagation();
        const isExpanded = chip.classList.contains('expanded');
        // collapse any other expanded chips
        canvas.querySelectorAll('.ribbon-chip.expanded').forEach(c => c.classList.remove('expanded'));
        if (!isExpanded) {
          chip.classList.add('expanded');
          // open the full info popup
          openCuriosity(ev);
        }
      });
      canvas.appendChild(chip);
    });
  }

  addChips(saxonCanvas, SAXON_EVENTS);
  addChips(islamCanvas, ISLAM_EVENTS);
  syncRibbon();
}

function syncRibbon() {
  const saxonCanvas = document.getElementById('ribbon-canvas-saxon');
  const islamCanvas = document.getElementById('ribbon-canvas-islam');
  if (saxonCanvas) saxonCanvas.style.transform = `translateX(${-scrollX}px)`;
  if (islamCanvas) islamCanvas.style.transform = `translateX(${-scrollX}px)`;
}

// ── CURIOSITY — ribbon tap (Saxon/Islam info only, no vote button) ────
function openCuriosity(ev) {
  const overlay = document.getElementById('curiosity-overlay');
  const modal   = document.getElementById('curiosity-modal');
  modal.className = `curiosity-modal ${ev.type === 'saxon' ? 'saxon-cm' : ''}`;

  const heroWrap = document.getElementById('cm-hero-wrap');
  if (ev.img) {
    heroWrap.innerHTML = `<img class="cm-hero" src="${ev.img}" alt="${ev.title}"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="cm-hero-placeholder" style="display:none">${ev.emoji}</div>`;
  } else {
    heroWrap.innerHTML = `<div class="cm-hero-placeholder">${ev.emoji}</div>`;
  }

  const ey = document.getElementById('cm-eyebrow');
  ey.className  = `cm-eyebrow ${ev.type}`;
  ey.textContent = ev.type === 'saxon' ? '⚔ Anglo-Saxon & Viking Britain' : '🌙 Golden Age of Islam';

  document.getElementById('cm-date').textContent  = ev.date;
  document.getElementById('cm-title').textContent = ev.title;
  document.getElementById('cm-text').textContent  = ev.detail;

  overlay.classList.add('open');
}

function closeCuriosity() {
  document.getElementById('curiosity-overlay').classList.remove('open');
  // collapse expanded ribbon chips
  document.querySelectorAll('.ribbon-chip.expanded').forEach(c => c.classList.remove('expanded'));
}
function closeCuriosityOverlay(e) {
  if (e.target === document.getElementById('curiosity-overlay')) closeCuriosity();
}

// ── CURIOSITY — Maya modal vote button ────────────────────────────────
const CURIOSITY_URL = 'https://script.google.com/macros/s/AKfycbwUzI5IITpYeJa_A4-mEgEAXmNktQCvz44s8S1LWyQcrtgBrICDXMyl5wLRuLEYMUIz/exec';
let currentModalEvent = null;

async function submitModalCuriosity() {
  if (!currentModalEvent) return;
  const ev  = currentModalEvent;
  const btn = document.getElementById('modal-curiosity-btn');
  const fb  = document.getElementById('modal-curiosity-feedback');

  btn.disabled    = true;
  btn.textContent = 'Sending…';

  const payload = {
    topic:    ev.title,
    period:   'Maya Civilisation',
    date:     ev.date,
    timestamp: new Date().toISOString(),
  };

  try {
    await fetch(CURIOSITY_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    btn.textContent = '✓ Recorded — thank you!';
    fb.textContent  = 'Your teacher can see which topics the class most want to explore.';
  } catch {
    btn.disabled    = false;
    btn.textContent = '★ I want to learn more about this!';
    fb.textContent  = 'Could not save — check your connection.';
  }
}

// ── INIT ──────────────────────────────────────────────────────────────
build();
buildRibbon();
setScroll(yearToX(-700) - document.getElementById('viewport').clientWidth * 0.15);
window.addEventListener('resize', () => { build(); buildRibbon(); setScroll(scrollX); });
</script>
