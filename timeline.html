<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Maya Civilisation · Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:    #c9a84c;
    --gold-lt: #e9c46a;
    --stone:   #3d2b1f;
    --stone-dk:#140a04;
    --cream:   #f5edd6;
    --sand:    #e8d5b0;
    --jade:    #2d6a4f;
    --jade-lt: #40916c;
    --terra:   #c1440e;
    --pakal:   #e9c46a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--stone-dk); color: var(--cream);
    user-select: none; -webkit-user-select: none;
  }

  .page { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; }

  /* ── HEADER ── */
  header {
    background: linear-gradient(180deg, #0d0604 0%, rgba(13,6,4,.8) 100%);
    border-bottom: 2px solid var(--gold);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    z-index: 10; flex-wrap: wrap;
  }
  .hdr-left .eyebrow {
    font-family: 'Cinzel', serif; font-size: .62rem;
    letter-spacing: .22em; color: var(--gold); text-transform: uppercase; margin-bottom: 3px;
  }
  .hdr-left h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1rem, 2.5vw, 1.55rem);
    font-weight: 700; color: var(--gold-lt); letter-spacing: .04em;
  }
  .legend { display: flex; gap: 18px; flex-wrap: wrap; align-items: center; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: .72rem; font-style: italic; color: var(--sand); white-space: nowrap; }
  .leg-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .leg-dot.general { background: var(--jade-lt); }
  .leg-dot.pakal   { background: var(--pakal); box-shadow: 0 0 7px var(--pakal); }
  .leg-dot.decline { background: var(--terra); }

  /* ── VIEWPORT ── */
  .timeline-viewport {
    overflow: hidden; position: relative; cursor: grab;
  }
  .timeline-viewport.grabbing { cursor: grabbing; }
  .timeline-viewport::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 15% 60%, rgba(45,106,79,.14) 0%, transparent 45%),
      radial-gradient(ellipse at 75% 25%, rgba(201,168,76,.09) 0%, transparent 40%),
      radial-gradient(ellipse at 55% 85%, rgba(193,68,14,.07) 0%, transparent 35%);
  }

  /* ── CANVAS ── */
  .timeline-canvas { position: relative; height: 100%; }

  /* ── SPINE ── */
  .spine {
    position: absolute; left: 0; height: 3px;
    background: linear-gradient(90deg,
      transparent 0%, rgba(201,168,76,.25) 2%,
      rgba(201,168,76,.65) 8%, rgba(201,168,76,.65) 92%,
      rgba(201,168,76,.25) 98%, transparent 100%);
    transform: translateY(-50%); pointer-events: none;
  }

  /* ── ERA BANDS ── */
  .era-band {
    position: absolute; top: 0; bottom: 0;
    border-left: 1px dashed rgba(201,168,76,.12); pointer-events: none;
  }
  .era-label {
    position: absolute; top: 14px;
    font-family: 'Cinzel', serif; font-size: .58rem; letter-spacing: .15em;
    color: rgba(201,168,76,.3); text-transform: uppercase; white-space: nowrap; padding-left: 8px;
  }

  /* ── EVENTS ── */
  .event {
    position: absolute; display: flex; flex-direction: column; align-items: center;
    cursor: pointer; transition: filter .18s;
  }
  .event:hover { filter: brightness(1.25); z-index: 5; }
  .event.above { flex-direction: column; }
  .event.below { flex-direction: column-reverse; }

  .event-line {
    width: 1px; flex-shrink: 0;
    background: rgba(201,168,76,.3); transition: background .18s;
  }
  .event:hover .event-line { background: var(--gold); }

  .event-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--stone-dk); flex-shrink: 0;
    transition: transform .18s; z-index: 2;
  }
  .event:hover .event-dot { transform: scale(1.5); }
  .event.general .event-dot { background: var(--jade-lt); }
  .event.pakal   .event-dot { background: var(--pakal); box-shadow: 0 0 10px rgba(233,196,106,.7); }
  .event.decline .event-dot { background: var(--terra); }

  /* ── CARD ── */
  .event-card {
    width: 200px;
    background: rgba(16,8,3,.9);
    border-radius: 9px;
    border: 1px solid rgba(201,168,76,.2);
    overflow: hidden;
    transition: border-color .18s, box-shadow .18s;
    backdrop-filter: blur(6px);
  }
  .event.pakal   .event-card { border-color: rgba(233,196,106,.45); box-shadow: 0 0 16px rgba(233,196,106,.12); }
  .event.decline .event-card { border-color: rgba(193,68,14,.35); }
  .event:hover   .event-card { border-color: var(--gold); box-shadow: 0 6px 24px rgba(201,168,76,.22); }
  .event.pakal:hover .event-card { box-shadow: 0 6px 28px rgba(233,196,106,.32); }

  .card-img {
    width: 100%; height: 100px; object-fit: cover;
    display: block; border-bottom: 1px solid rgba(201,168,76,.15);
    background: rgba(0,0,0,.4);
  }
  .card-img-placeholder {
    width: 100%; height: 100px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; background: rgba(0,0,0,.35);
    border-bottom: 1px solid rgba(201,168,76,.15);
  }
  .card-body { padding: 9px 11px; }
  .card-date {
    font-family: 'Cinzel', serif; font-size: .58rem; letter-spacing: .1em;
    margin-bottom: 3px;
  }
  .event.general .card-date { color: var(--jade-lt); }
  .event.pakal   .card-date { color: var(--pakal); }
  .event.decline .card-date { color: var(--terra); }
  .card-title {
    font-family: 'Cinzel', serif; font-size: .7rem; font-weight: 600;
    color: var(--cream); line-height: 1.25;
  }
  .event.pakal .card-title { color: var(--gold-lt); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(6,3,1,.8);
    z-index: 100; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .25s;
    backdrop-filter: blur(4px); padding: 20px;
  }
  .modal-overlay.open { opacity: 1; pointer-events: auto; }

  .modal {
    background: linear-gradient(145deg, #2a1508 0%, #180c04 100%);
    border: 1px solid var(--gold); border-radius: 14px;
    max-width: 560px; width: 100%; position: relative;
    box-shadow: 0 24px 70px rgba(0,0,0,.8);
    transform: translateY(24px) scale(.97);
    transition: transform .28s cubic-bezier(.34,1.4,.64,1);
    overflow: hidden;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal.pakal-modal  { border-color: var(--pakal); box-shadow: 0 24px 70px rgba(0,0,0,.8), 0 0 40px rgba(233,196,106,.18); }
  .modal.decline-modal { border-color: var(--terra); }

  .modal-hero {
    width: 100%; height: 200px; object-fit: cover; display: block;
    border-bottom: 1px solid rgba(201,168,76,.2);
    background: rgba(0,0,0,.5);
  }
  .modal-hero-placeholder {
    width: 100%; height: 200px;
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem; background: rgba(0,0,0,.4);
    border-bottom: 1px solid rgba(201,168,76,.2);
  }
  .modal-content { padding: 22px 26px 26px; }
  .modal-eyebrow {
    font-family: 'Cinzel', serif; font-size: .6rem; letter-spacing: .18em;
    text-transform: uppercase; margin-bottom: 5px;
  }
  .modal-eyebrow.general { color: var(--jade-lt); }
  .modal-eyebrow.pakal   { color: var(--pakal); }
  .modal-eyebrow.decline { color: var(--terra); }
  .modal-date { font-family: 'Cinzel', serif; font-size: 1rem; color: var(--gold-lt); margin-bottom: 4px; }
  .modal-title {
    font-family: 'Cinzel', serif; font-size: 1.35rem; font-weight: 700;
    color: var(--cream); line-height: 1.2; margin-bottom: 14px;
  }
  .modal.pakal-modal .modal-title { color: var(--gold-lt); }
  .modal-body { font-size: .98rem; line-height: 1.72; color: var(--sand); }
  .modal-caption {
    margin-top: 10px; font-size: .72rem; font-style: italic;
    color: rgba(232,213,176,.4);
  }
  .modal-close {
    position: absolute; top: 12px; right: 14px;
    background: rgba(0,0,0,.5); border: 1px solid rgba(201,168,76,.35);
    color: var(--sand); border-radius: 5px; padding: 4px 12px;
    cursor: pointer; font-family: 'Cinzel', serif; font-size: .6rem;
    letter-spacing: .1em; transition: all .2s; z-index: 10;
    backdrop-filter: blur(4px);
  }
  .modal-close:hover { border-color: var(--gold); color: var(--gold-lt); }

  /* ── FOOTER ── */
  footer {
    background: rgba(0,0,0,.55); border-top: 1px solid rgba(201,168,76,.18);
    padding: 8px 20px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px; z-index: 10; flex-wrap: wrap;
  }
  .hint { font-size: .7rem; font-style: italic; color: rgba(232,213,176,.38); }
  .minimap-row { display: flex; align-items: center; gap: 8px; }
  .minimap-track {
    width: 180px; height: 4px; background: rgba(201,168,76,.14);
    border-radius: 2px; position: relative; cursor: pointer;
  }
  .minimap-thumb { position: absolute; top: 0; height: 100%; background: var(--gold); border-radius: 2px; transition: left .08s, width .08s; }
  .era-now { font-size: .65rem; font-style: italic; color: rgba(232,213,176,.38); white-space: nowrap; }
  .nav-btns { display: flex; gap: 8px; }
  .nav-btn {
    font-family: 'Cinzel', serif; font-size: .65rem; letter-spacing: .08em;
    text-transform: uppercase; padding: 8px 20px;
    background: transparent; border: 1px solid rgba(201,168,76,.32);
    color: var(--sand); border-radius: 5px; cursor: pointer; transition: all .2s;
  }
  .nav-btn:hover { border-color: var(--gold); color: var(--gold-lt); }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="hdr-left">
      <div class="eyebrow">Maya Enquiry · Year 4 · Wallscourt Farm Academy</div>
      <h1>Maya Civilisation Timeline</h1>
    </div>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot general"></div>Maya events</div>
      <div class="leg-item"><div class="leg-dot pakal"></div>Pakal Votan &amp; Palenque</div>
      <div class="leg-item"><div class="leg-dot decline"></div>Decline &amp; conquest</div>
    </div>
  </header>

  <div class="timeline-viewport" id="viewport">
    <div class="timeline-canvas" id="canvas"></div>
  </div>

  <footer>
    <div class="hint">← Drag or use arrow keys · Tap any event to learn more →</div>
    <div class="minimap-row">
      <span class="era-now" id="era-now">—</span>
      <div class="minimap-track" id="minimap-track">
        <div class="minimap-thumb" id="minimap-thumb"></div>
      </div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="scrollBy(-500)">← Earlier</button>
      <button class="nav-btn" onclick="scrollBy(500)">Later →</button>
    </div>
  </footer>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕ Close</button>
    <div id="modal-hero-wrap"></div>
    <div class="modal-content">
      <div class="modal-eyebrow" id="modal-eyebrow"></div>
      <div class="modal-date"    id="modal-date"></div>
      <div class="modal-title"   id="modal-title"></div>
      <div class="modal-body"    id="modal-body"></div>
      <div class="modal-caption" id="modal-caption"></div>
    </div>
  </div>
</div>

    img:'https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/Lake_Peten_Itza_Guatemala.jpg/400px-Lake_Peten_Itza_Guatemala.jpg',
    caption:'Lake Petén Itzá, Guatemala — site of the last independent Maya city, Nojpetén.',

const ERAS = [
  { label:'Early Preclassic', start:-2000 },
  { label:'Late Preclassic',  start:-400  },
  { label:'Early Classic',    start:250   },
  { label:'Late Classic',     start:550   },
  { label:'Terminal Classic', start:800   },
  { label:'Postclassic',      start:900   },
  { label:'Spanish Contact',  start:1500  },
];

// ── CONFIG ────────────────────────────────────────────────────────────
const PX_PER_YEAR = 0.55;
const MIN_YEAR    = -2200;
const MAX_YEAR    = 1900;
const PAD         = 260;
const SPINE_FRAC  = 0.5;
const BASE_LINE   = 90;

const TOTAL_W = PAD * 2 + (MAX_YEAR - MIN_YEAR) * PX_PER_YEAR;

function yearToX(y) { return PAD + (y - MIN_YEAR) * PX_PER_YEAR; }

// ── BUILD ─────────────────────────────────────────────────────────────
function build() {
  const vp     = document.getElementById('viewport');
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  canvas.style.width = TOTAL_W + 'px';

  const H      = vp.clientHeight;
  const spineY = H * SPINE_FRAC;

  // Spine
  const spine       = document.createElement('div');
  spine.className   = 'spine';
  spine.style.top   = spineY + 'px';
  spine.style.width = TOTAL_W + 'px';
  canvas.appendChild(spine);

  // Era bands
  ERAS.forEach((era, i) => {
    const x    = yearToX(era.start);
    const band = document.createElement('div');
    band.className      = 'era-band';
    band.style.left     = x + 'px';
    const nextX = i < ERAS.length - 1 ? yearToX(ERAS[i+1].start) : TOTAL_W;
    band.style.width    = (nextX - x) + 'px';
    const lbl           = document.createElement('div');
    lbl.className       = 'era-label';
    lbl.textContent     = era.label;
    band.appendChild(lbl);
    canvas.appendChild(band);
  });

  // Events
  EVENTS.forEach((ev, i) => {
    const x      = yearToX(ev.year);
    const above  = i % 2 === 0;
    const lineH  = BASE_LINE + (i % 4) * 20;

    const el         = document.createElement('div');
    el.className     = `event ${ev.type} ${above ? 'above' : 'below'}`;
    el.style.left    = (x - 100) + 'px'; // 200px card centred

    // Image or emoji fallback
    const imgEl = ev.img
      ? `<img class="card-img" src="${ev.img}" alt="${ev.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="card-img-placeholder" style="display:none">${ev.emoji}</div>`
      : `<div class="card-img-placeholder">${ev.emoji}</div>`;

    const card = `
      <div class="event-card">
        ${imgEl}
        <div class="card-body">
          <div class="card-date">${ev.date}</div>
          <div class="card-title">${ev.title}</div>
        </div>
      </div>`;
    const line = `<div class="event-line" style="height:${lineH}px"></div>`;
    const dot  = `<div class="event-dot"></div>`;

    el.innerHTML = above
      ? card + line + dot
      : dot + line + card;

    if (above) {
      el.style.bottom = (H - spineY + 6) + 'px';
    } else {
      el.style.top    = (spineY + 6) + 'px';
    }

    el.addEventListener('click', () => { if (!didDrag) openModal(ev); });
    canvas.appendChild(el);
  });
}

// ── SCROLL ────────────────────────────────────────────────────────────
let scrollX = 0, didDrag = false;

function setScroll(x) {
  const vp  = document.getElementById('viewport');
  const max = TOTAL_W - vp.clientWidth;
  scrollX   = Math.max(0, Math.min(max, x));
  document.getElementById('canvas').style.transform = `translateX(${-scrollX}px)`;
  updateUI();
}
function scrollBy(dx) { setScroll(scrollX + dx); }

function updateUI() {
  const vp    = document.getElementById('viewport');
  const ratio = vp.clientWidth / TOTAL_W;
  const track = document.getElementById('minimap-track');
  const tw    = track.clientWidth;
  const thumb = document.getElementById('minimap-thumb');
  thumb.style.width = Math.max(14, ratio * tw) + 'px';
  thumb.style.left  = (scrollX / TOTAL_W * tw) + 'px';

  const centreYear = MIN_YEAR + (scrollX + vp.clientWidth / 2 - PAD) / PX_PER_YEAR;
  let label = ERAS[0].label;
  for (const era of ERAS) { if (centreYear >= era.start) label = era.label; }
  document.getElementById('era-now').textContent = label;
}

// ── DRAG ──────────────────────────────────────────────────────────────
let dragging = false, dragX0 = 0, scrollX0 = 0;
const vp = document.getElementById('viewport');

vp.addEventListener('mousedown', e => {
  dragging = true; didDrag = false;
  dragX0 = e.clientX; scrollX0 = scrollX;
  vp.classList.add('grabbing');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - dragX0;
  if (Math.abs(dx) > 5) didDrag = true;
  setScroll(scrollX0 - dx);
});
window.addEventListener('mouseup', () => { dragging = false; vp.classList.remove('grabbing'); });

let tx0 = 0, sx0 = 0;
vp.addEventListener('touchstart', e => { tx0 = e.touches[0].clientX; sx0 = scrollX; didDrag = false; }, { passive:true });
vp.addEventListener('touchmove',  e => {
  const dx = e.touches[0].clientX - tx0;
  if (Math.abs(dx) > 8) didDrag = true;
  setScroll(sx0 - dx);
}, { passive:true });

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') scrollBy(180);
  if (e.key === 'ArrowLeft')  scrollBy(-180);
  if (e.key === 'Escape')     closeModal();
});

document.getElementById('minimap-track').addEventListener('click', e => {
  const r = e.currentTarget.getBoundingClientRect();
  setScroll((e.clientX - r.left) / r.width * TOTAL_W);
});

// ── MODAL ─────────────────────────────────────────────────────────────
function openModal(ev) {
  const overlay = document.getElementById('modal-overlay');
  const modal   = document.getElementById('modal');
  modal.className = 'modal';
  if (ev.type === 'pakal')   modal.classList.add('pakal-modal');
  if (ev.type === 'decline') modal.classList.add('decline-modal');

  // Hero image
  const heroWrap = document.getElementById('modal-hero-wrap');
  if (ev.img) {
    heroWrap.innerHTML = `<img class="modal-hero" src="${ev.img}" alt="${ev.title}"
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="modal-hero-placeholder" style="display:none">${ev.emoji}</div>`;
  } else {
    heroWrap.innerHTML = `<div class="modal-hero-placeholder">${ev.emoji}</div>`;
  }

  const ey = document.getElementById('modal-eyebrow');
  ey.className  = `modal-eyebrow ${ev.type}`;
  ey.textContent = ev.type === 'pakal'   ? '★ Pakal Votan & Palenque'
                 : ev.type === 'decline' ? '⚠ Decline & Conquest'
                 : '◆ Maya Civilisation';

  document.getElementById('modal-date').textContent    = ev.date;
  document.getElementById('modal-title').textContent   = ev.title;
  document.getElementById('modal-body').textContent    = ev.detail;
  document.getElementById('modal-caption').textContent = ev.caption || '';

  overlay.classList.add('open');
}
function closeModal()       { document.getElementById('modal-overlay').classList.remove('open'); }
function overlayClick(e)    { if (e.target === document.getElementById('modal-overlay')) closeModal(); }

// ── INIT ──────────────────────────────────────────────────────────────
build();
setScroll(yearToX(-700) - document.getElementById('viewport').clientWidth * 0.15);
window.addEventListener('resize', () => { build(); setScroll(scrollX); });
</script>
</body>
