<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson 7 · Print View</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family:'TwinklCursive';
    src:url('TwinklCursiveLooped-Regular.ttf') format('truetype');
    font-weight:normal; font-style:normal;
  }

  :root {
    --gold:#c9a84c; --gold-lt:#e9c46a;
    --stone-dk:#140a04; --cream:#f5edd6; --sand:#e8d5b0;
    --jade:#2d6a4f; --jade-lt:#40916c;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Crimson Pro',Georgia,serif; background:#e8e4dc; color:#1a1a1a; min-height:100vh; }

  /* ── SCREEN CHROME ── */
  .screen-header {
    background:linear-gradient(180deg,#0d0604 0%,rgba(13,6,4,.9) 100%);
    border-bottom:2px solid var(--gold); padding:12px 24px;
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    position:sticky; top:0; z-index:100;
  }
  .eyebrow { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.22em; color:var(--gold); text-transform:uppercase; margin-bottom:3px; }
  .screen-header h1 { font-family:'Cinzel',serif; font-size:clamp(.9rem,2vw,1.3rem); font-weight:700; color:var(--gold-lt); }
  .hdr-right { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .live-dot { width:8px; height:8px; border-radius:50%; background:var(--jade-lt); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  .screen-btn { font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; padding:10px 22px; border:none; border-radius:5px; cursor:pointer; transition:all .2s; }
  .btn-print { background:linear-gradient(135deg,var(--gold) 0%,#a8832a 100%); color:#1e0f07; }
  .btn-print:hover { transform:translateY(-1px); }
  .btn-refresh { background:transparent; color:var(--sand); border:1px solid rgba(201,168,76,.4); }
  .btn-refresh:hover { border-color:var(--gold); color:var(--gold-lt); }
  .screen-main { max-width:900px; margin:24px auto; padding:0 16px 60px; display:flex; flex-direction:column; gap:20px; }
  .status { text-align:center; padding:60px 20px; font-family:'Cinzel',serif; font-size:.8rem; letter-spacing:.1em; color:rgba(26,26,26,.5); text-transform:uppercase; }

  /* ── A4 SHEET ── */
  .a4-sheet {
    background:#fff; width:100%; max-width:794px;
    margin:0 auto; padding:20px 24px;
    border:1px solid #ccc; box-shadow:0 2px 16px rgba(0,0,0,.12);
    font-size:10pt; color:#1a1a1a;
    page-break-after:always;
  }

  /* Sheet header */
  .sheet-header {
    display:flex; align-items:center; justify-content:space-between;
    padding-bottom:10px; margin-bottom:16px; gap:10px;
    border-bottom:2px solid #1a1a2e;
  }
  .sheet-title { font-family:'Cinzel',Georgia,serif; font-size:13pt; font-weight:700; color:#1a1a2e; }
  .sheet-date  { font-family:'Cinzel',Georgia,serif; font-size:7.5pt; color:#777; text-transform:uppercase; letter-spacing:.08em; margin-top:2px; }
  .sheet-name-box { border:1.5px solid #1a1a2e; border-radius:4px; padding:6px 16px; text-align:center; min-width:200px; }
  .sheet-name-label { font-family:'Cinzel',Georgia,serif; font-size:7pt; color:#777; text-transform:uppercase; letter-spacing:.1em; }
  .sheet-name { font-family:'TwinklCursive','Crimson Pro',Georgia,serif; font-size:13pt; color:#1a1a2e; margin-top:3px; }

  /* Two-col layout */
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; align-items:start; }

  /* ── SECTION WRAPPER ── */
  .section { border:1px solid #ddd; border-radius:6px; overflow:hidden; }
  .section-title-bar { padding:5px 10px; border-bottom:1px solid #ddd; }
  .section-title { font-family:'Cinzel',Georgia,serif; font-size:7.5pt; letter-spacing:.1em; text-transform:uppercase; color:#1a1a2e; }
  .section-body { padding:10px; }

  /* ── DIAMOND NINE ── */
  .diamond-grid {
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: repeat(5, auto);
    gap:4px;
    margin-bottom:10px;
  }
  .d-cell { grid-column: 2; /* default: centre */ }

  /* Diamond positions */
  .pos-1 { grid-column:2; grid-row:1; }
  .pos-2 { grid-column:1; grid-row:2; }
  .pos-3 { grid-column:3; grid-row:2; }
  .pos-4 { grid-column:1; grid-row:3; }
  .pos-5 { grid-column:2; grid-row:3; }
  .pos-6 { grid-column:3; grid-row:3; }
  .pos-7 { grid-column:1; grid-row:4; }
  .pos-8 { grid-column:3; grid-row:4; }
  .pos-9 { grid-column:2; grid-row:5; }

  .d-card {
    border:1px solid #ccc; border-radius:5px; padding:5px 4px;
    text-align:center; background:#fafafa;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:38px;
  }
  .d-card.top-card { border-color:#c9a84c; background:#fffbf0; }
  .d-card.bot-card { border-color:#b0b0b0; background:#f5f5f5; }
  .d-icon  { font-size:11pt; line-height:1; margin-bottom:2px; }
  .d-name  { font-family:'Cinzel',Georgia,serif; font-size:6pt; letter-spacing:.04em; text-transform:uppercase; color:#1a1a2e; line-height:1.2; }
  .d-pos   { font-family:'Cinzel',Georgia,serif; font-size:5.5pt; color:#aaa; margin-bottom:1px; }
  .d-card.top-card .d-pos { color:#a8832a; }
  .d-card.bot-card .d-pos { color:#888; }

  /* Reasons */
  .reason-box { border:1px solid #e0e0e0; border-radius:5px; padding:7px 9px; margin-top:5px; background:#fafafa; }
  .reason-label { font-family:'Cinzel',Georgia,serif; font-size:6.5pt; letter-spacing:.08em; text-transform:uppercase; color:#999; margin-bottom:3px; }
  .reason-label.top { color:#a8832a; }
  .reason-text {
    font-family:'TwinklCursive','Crimson Pro',Georgia,serif;
    font-size:11pt; line-height:1.6; color:#1a1a2e; min-height:20px;
  }
  .reason-text.empty { font-family:'Crimson Pro',Georgia,serif; font-size:8.5pt; color:#bbb; font-style:italic; }
  .no-data { font-family:'Crimson Pro',Georgia,serif; font-size:8.5pt; color:#aaa; font-style:italic; padding:6px 0; }

  /* ── VENN DIAGRAM ── */
  .venn-wrap { position:relative; width:100%; }
  .venn-svg  { width:100%; height:auto; display:block; }

  /* Zone text overlays — positioned as % over the SVG */
  .venn-overlay { position:absolute; inset:0; pointer-events:none; }
  .vzone {
    position:absolute;
    display:flex; flex-direction:column; align-items:center;
    font-family:'TwinklCursive','Crimson Pro',Georgia,serif;
    font-size:7pt; line-height:1.4; text-align:center; color:#1a1a2e;
    overflow:hidden;
  }
  .vzone-label {
    font-family:'Cinzel',Georgia,serif;
    font-size:5.5pt; letter-spacing:.07em; text-transform:uppercase;
    margin-bottom:2px; color:#555;
  }
  .vzone-item { margin-bottom:1px; }
  .vzone.empty .vzone-item { color:#bbb; font-style:italic; font-family:'Crimson Pro',Georgia,serif; }

  /* ── PRINT ── */
  @media print {
    body { background:#fff; }
    .screen-header, .screen-main > *:not(.a4-sheet) { display:none !important; }
    .screen-main { max-width:none; margin:0; padding:0; gap:0; }
    .a4-sheet {
      width:210mm; max-width:none; min-height:297mm;
      margin:0; padding:14mm 16mm; border:none; box-shadow:none;
      page-break-after:always;
    }
  }
</style>
</head>
<body>

<div class="screen-header">
  <div>
    <div class="eyebrow">Teacher View · Lesson 7 · Maya Enquiry</div>
    <h1>Print View — Venn Diagram &amp; Diamond Nine</h1>
  </div>
  <div class="hdr-right">
    <div class="live-dot"></div>
    <button class="screen-btn btn-refresh" onclick="load()">↺ Refresh</button>
    <button class="screen-btn btn-print"   onclick="window.print()">🖨 Print All</button>
  </div>
</div>

<div class="screen-main" id="main">
  <div class="status" id="status">Loading data…</div>
</div>

<script>
const VENN_CSV    = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQNqr1dLDto9DsqIrTYAmK4aay6J6d9AHv0QHmJazO-I42Mx1uDhzKtb0YFvivALTnnfp74fE3hnJVc/pub?gid=0&single=true&output=csv';
const DIAMOND_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRPRURE9g1iYKrOtQCF3PMwggQDR2qeudR7fzOStsUr_L-ZvNvPRoW2Q0nEFFNsDAFaA7Ow8VuGAVDI/pub?gid=0&single=true&output=csv';

const D9_CARDS = {
  'The King':          '👑',
  'Nobles':            '⚔️',
  'Farmers':           '🌽',
  'Artisans':          '🏺',
  'Slaves':            '⛓️',
  'Animal Companions': '🐆',
  'Divine Right':      '☀️',
  'Unpaid Labour':     '🔨',
  'Ahau Pacal Votan':  '🌟',
};

function splitCSV(line) {
  const r=[]; let c='',q=false;
  for(const ch of line){if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else{c+=ch;}}
  r.push(c.trim()); return r;
}
function normName(n) { return (n||'').toLowerCase().replace(/[^a-z0-9]/g,''); }

async function fetchCSV(url) {
  const res   = await fetch(url + '&t=' + Date.now());
  const text  = await res.text();
  const lines = text.trim().split('\n').filter(l=>l.trim());
  if (lines.length < 2) return [];
  const headers = splitCSV(lines[0]).map(h=>h.trim().toLowerCase());
  return lines.slice(1).map(l => {
    const cols = splitCSV(l);
    const obj  = {};
    headers.forEach((h,i) => obj[h] = cols[i]||'');
    return obj;
  });
}

function latestByName(rows, nameField) {
  const map = {};
  rows.forEach(r => {
    const raw = r[nameField] || r['name'] || r['names'] || '';
    const key = normName(raw);
    if (!key) return;
    if (!map[key] || r.timestamp > map[key].timestamp) {
      map[key] = { ...r, _displayName: raw };
    }
  });
  return map;
}

async function load() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="status">Loading…</div>';
  try {
    const [vennRows, d9Rows] = await Promise.all([
      fetchCSV(VENN_CSV).catch(()=>[]),
      fetchCSV(DIAMOND_CSV).catch(()=>[]),
    ]);

    const vennMap = latestByName(vennRows, 'names');
    const d9Map   = latestByName(d9Rows, 'name');

    const allKeys = new Set([...Object.keys(vennMap), ...Object.keys(d9Map)]);
    if (!allKeys.size) {
      main.innerHTML = '<div class="status">No submissions yet.</div>';
      return;
    }
    main.innerHTML = '';

    const entries = [...allKeys].map(key => ({
      key,
      displayName: (vennMap[key] || d9Map[key])?._displayName || key,
    })).sort((a,b) => a.displayName.localeCompare(b.displayName));

    entries.forEach(({ key, displayName }) => {
      main.appendChild(buildSheet(displayName, vennMap[key]||null, d9Map[key]||null));
    });
  } catch(e) {
    main.innerHTML = `<div class="status">Could not load.<br><small>${e.message}</small></div>`;
  }
}

// ── DIAMOND NINE HTML ─────────────────────────────────────────────────
function buildDiamond(d9) {
  if (!d9) return '<div class="no-data">No Diamond Nine submission recorded.</div>';

  const topCard = d9.topcard || '';
  const botCard = d9.bottomcard || '';
  const topReason = d9.topreason || '';
  const botReason = d9.bottomreason || '';

  // We only have top and bottom reliably — fill placeholders for middle
  const positions = [
    { pos:1, name: topCard, isTop:true },
    { pos:2, name:'', isTop:false },
    { pos:3, name:'', isTop:false },
    { pos:4, name:'', isTop:false },
    { pos:5, name:'', isTop:false },
    { pos:6, name:'', isTop:false },
    { pos:7, name:'', isTop:false },
    { pos:8, name:'', isTop:false },
    { pos:9, name: botCard, isBot:true },
  ];

  const cells = positions.map(p => {
    const icon   = D9_CARDS[p.name] || '•';
    const cls    = p.isTop ? 'top-card' : p.isBot ? 'bot-card' : '';
    const posLbl = p.isTop ? '★ Most important' : p.isBot ? '◇ Least important' : `Position ${p.pos}`;
    return `<div class="d-card pos-${p.pos} ${cls}">
      <div class="d-pos">${posLbl}</div>
      ${p.name ? `<div class="d-icon">${icon}</div><div class="d-name">${p.name}</div>` : ''}
    </div>`;
  }).join('');

  return `
    <div class="diamond-grid">${cells}</div>
    <div class="reason-box">
      <div class="reason-label top">Why is ${topCard || '—'} most important?</div>
      <div class="reason-text ${topReason ? '' : 'empty'}">${topReason || 'No reason recorded'}</div>
    </div>
    <div class="reason-box" style="margin-top:5px">
      <div class="reason-label">Why is ${botCard || '—'} least important?</div>
      <div class="reason-text ${botReason ? '' : 'empty'}">${botReason || 'No reason recorded'}</div>
    </div>`;
}

// ── VENN HTML (SVG circles + overlay text) ────────────────────────────
function buildVenn(venn) {
  if (!venn) return '<div class="no-data">No Venn Diagram submission recorded.</div>';

  function items(str) {
    if (!str || str==='—') return [];
    return str.split('|').map(s=>s.trim()).filter(Boolean);
  }

  // Field name mapping — handle lowercase CSV headers
  const zones = {
    'maya-only':  items(venn.mayaonly  || venn['maya only']  || ''),
    'saxon-only': items(venn.saxononly || venn['saxon only'] || ''),
    'islam-only': items(venn.islamonly || venn['islam only'] || ''),
    'ms':         items(venn.mayasaxon || venn['maya saxon'] || venn['mayasaxon'] || ''),
    'mi':         items(venn.mayaislam || venn['maya islam'] || venn['mayaislam'] || ''),
    'si':         items(venn.saxonislam|| venn['saxon islam']|| venn['saxonislam']|| ''),
    'all':        items(venn.allthree  || venn['all three']  || venn['allthree']  || ''),
  };

  function zoneText(list, max=3) {
    if (!list.length) return `<div class="vzone-item" style="color:#bbb;font-style:italic;font-family:'Crimson Pro'">—</div>`;
    return list.slice(0, max).map(t =>
      `<div class="vzone-item">${t.length > 30 ? t.slice(0,28)+'…' : t}</div>`
    ).join('') + (list.length > max ? `<div class="vzone-item" style="opacity:.55">+${list.length-max} more</div>` : '');
  }

  // SVG viewBox 400×320 — three overlapping circles
  // Maya: cx=155 cy=125 r=115
  // Saxon: cx=245 cy=125 r=115
  // Islam: cx=200 cy=218 r=115
  // Zone centres (approx):
  // maya-only: 90,100   saxon-only: 315,100   islam-only: 200,295
  // ms: 200,95          mi: 135,210            si: 268,210
  // all: 200,170

  return `
    <div class="venn-wrap">
      <svg class="venn-svg" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
        <!-- Circles -->
        <circle cx="155" cy="125" r="115" fill="rgba(184,115,58,.1)" stroke="rgba(184,115,58,.7)" stroke-width="1.5"/>
        <circle cx="245" cy="125" r="115" fill="rgba(74,127,168,.1)"  stroke="rgba(74,127,168,.7)"  stroke-width="1.5"/>
        <circle cx="200" cy="218" r="115" fill="rgba(122,79,168,.1)"  stroke="rgba(122,79,168,.7)"  stroke-width="1.5"/>
        <!-- Labels -->
        <text x="78"  y="42"  font-family="Cinzel,serif" font-size="9"  font-weight="700" fill="#b8733a" text-anchor="middle">🏺 Maya</text>
        <text x="322" y="42"  font-family="Cinzel,serif" font-size="9"  font-weight="700" fill="#4a7fa8" text-anchor="middle">⚔️ Saxon</text>
        <text x="200" y="316" font-family="Cinzel,serif" font-size="9"  font-weight="700" fill="#7a4fa8" text-anchor="middle">🌙 Islam</text>
      </svg>

      <!-- Text overlays positioned over each zone -->
      <div class="venn-overlay">

        <div class="vzone" style="left:1%;top:22%;width:22%;max-height:22%">
          <div class="vzone-label">Maya only</div>
          ${zoneText(zones['maya-only'])}
        </div>

        <div class="vzone" style="left:39%;top:5%;width:22%;max-height:18%">
          <div class="vzone-label">Maya + Saxon</div>
          ${zoneText(zones['ms'],2)}
        </div>

        <div class="vzone" style="right:1%;top:22%;width:22%;max-height:22%">
          <div class="vzone-label">Saxon only</div>
          ${zoneText(zones['saxon-only'])}
        </div>

        <div class="vzone" style="left:13%;top:55%;width:20%;max-height:22%">
          <div class="vzone-label">Maya + Islam</div>
          ${zoneText(zones['mi'],2)}
        </div>

        <div class="vzone" style="left:36%;top:46%;width:28%;max-height:24%">
          <div class="vzone-label">All three</div>
          ${zoneText(zones['all'],3)}
        </div>

        <div class="vzone" style="right:13%;top:55%;width:20%;max-height:22%">
          <div class="vzone-label">Saxon + Islam</div>
          ${zoneText(zones['si'],2)}
        </div>

        <div class="vzone" style="left:38%;top:78%;width:24%;max-height:18%">
          <div class="vzone-label">Islam only</div>
          ${zoneText(zones['islam-only'],2)}
        </div>

      </div>
    </div>`;
}

// ── BUILD SHEET ───────────────────────────────────────────────────────
function buildSheet(name, venn, d9) {
  const sheet = document.createElement('div');
  sheet.className = 'a4-sheet';
  const date = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

  sheet.innerHTML = `
    <div class="sheet-header">
      <div>
        <div class="sheet-title">Lesson 7 — Comparing &amp; Ranking</div>
        <div class="sheet-date">Maya Enquiry · Year 4 · ${date}</div>
      </div>
      <div class="sheet-name-box">
        <div class="sheet-name-label">Trio</div>
        <div class="sheet-name">${name}</div>
      </div>
    </div>

    <div class="two-col">
      <div>
        <div class="section">
          <div class="section-title-bar">
            <div class="section-title">◆ Diamond Nine — Who Mattered Most?</div>
          </div>
          <div class="section-body">${buildDiamond(d9)}</div>
        </div>
      </div>
      <div>
        <div class="section">
          <div class="section-title-bar">
            <div class="section-title">🔵 Venn Diagram — Comparing Hierarchies</div>
          </div>
          <div class="section-body">${buildVenn(venn)}</div>
        </div>
      </div>
    </div>`;

  return sheet;
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
