<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson 7 · Print View</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'TwinklCursive';
    src: url('TwinklCursiveLooped-Regular.ttf') format('truetype');
    font-weight: normal; font-style: normal;
  }

  :root {
    --gold:#c9a84c; --gold-lt:#e9c46a;
    --stone-dk:#140a04; --cream:#f5edd6; --sand:#e8d5b0;
    --jade:#2d6a4f; --jade-lt:#40916c;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

  body { font-family:'Crimson Pro',Georgia,serif; background:#e8e4dc; color:#1a1a1a; min-height:100vh; }

  /* ── SCREEN CHROME ── */
  .screen-header {
    background:linear-gradient(180deg,#0d0604 0%,rgba(13,6,4,.9) 100%);
    border-bottom:2px solid var(--gold);
    padding:12px 24px;
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    position:sticky; top:0; z-index:100;
  }
  .eyebrow { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.22em; color:var(--gold); text-transform:uppercase; margin-bottom:3px; }
  .screen-header h1 { font-family:'Cinzel',serif; font-size:clamp(.9rem,2vw,1.3rem); font-weight:700; color:var(--gold-lt); }
  .hdr-right { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .live-dot { width:8px; height:8px; border-radius:50%; background:var(--jade-lt); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  .screen-btn { font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; padding:10px 22px; border:none; border-radius:5px; cursor:pointer; transition:all .2s; }
  .btn-print { background:linear-gradient(135deg,var(--gold) 0%,#a8832a 100%); color:#1e0f07; }
  .btn-print:hover { transform:translateY(-1px); }
  .btn-refresh { background:transparent; color:var(--sand); border:1px solid rgba(201,168,76,.4); }
  .btn-refresh:hover { border-color:var(--gold); color:var(--gold-lt); }
  .screen-main { max-width:900px; margin:24px auto; padding:0 16px 60px; display:flex; flex-direction:column; gap:20px; }
  .status { text-align:center; padding:60px 20px; font-family:'Cinzel',serif; font-size:.8rem; letter-spacing:.1em; color:rgba(26,26,26,.5); text-transform:uppercase; }

  /* ── A4 SHEETS ── */
  .a4-sheet {
    background:#fff; width:100%; max-width:794px;
    margin:0 auto; padding:24px 28px;
    border:1px solid #ccc; box-shadow:0 2px 16px rgba(0,0,0,.12);
    font-size:10pt; color:#1a1a1a;
    page-break-after:always;
  }

  /* Header */
  .sheet-header {
    display:flex; align-items:center; justify-content:space-between;
    padding-bottom:10px; margin-bottom:14px; gap:10px;
    border-bottom:2px solid #1a1a2e;
  }
  .sheet-title { font-family:'Cinzel',Georgia,serif; font-size:13pt; font-weight:700; color:#1a1a2e; }
  .sheet-subtitle { font-size:8pt; color:#666; font-family:'Cinzel',Georgia,serif; letter-spacing:.08em; text-transform:uppercase; margin-top:2px; }
  .sheet-name-box { border:1.5px solid #1a1a2e; border-radius:4px; padding:6px 14px; min-width:200px; text-align:center; }
  .sheet-name-label { font-size:7pt; color:#777; text-transform:uppercase; letter-spacing:.1em; font-family:'Cinzel',Georgia,serif; }
  .sheet-name { font-family:'TwinklCursive','Crimson Pro',Georgia,serif; font-size:13pt; color:#1a1a2e; margin-top:3px; }

  /* Section */
  .section { margin-bottom:14px; border:1px solid #ddd; border-radius:5px; overflow:hidden; }
  .section-header {
    padding:6px 12px; border-bottom:1px solid #ddd;
    display:flex; align-items:center; justify-content:space-between;
  }
  .section-title { font-family:'Cinzel',Georgia,serif; font-size:8pt; letter-spacing:.1em; text-transform:uppercase; color:#1a1a2e; }
  .section-badge { font-family:'Cinzel',Georgia,serif; font-size:7.5pt; color:#555; }
  .section-body { padding:10px 12px; }

  /* Diamond Nine */
  .d9-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .d9-card { border:1.5px solid #ddd; border-radius:5px; padding:8px 10px; }
  .d9-card-pos { font-family:'Cinzel',Georgia,serif; font-size:7pt; letter-spacing:.1em; text-transform:uppercase; color:#888; margin-bottom:4px; }
  .d9-card-name { font-family:'Cinzel',Georgia,serif; font-size:10pt; font-weight:700; color:#1a1a2e; margin-bottom:5px; }
  .d9-card.top { border-color:#c9a84c; background:#fffbf0; }
  .d9-card.top .d9-card-pos { color:#a8832a; }
  .d9-reason-label { font-size:7pt; color:#888; text-transform:uppercase; letter-spacing:.08em; font-family:'Cinzel',Georgia,serif; margin-bottom:3px; }
  .d9-reason { font-family:'TwinklCursive','Crimson Pro',Georgia,serif; font-size:11pt; line-height:1.6; color:#1a1a2e; min-height:22px; }
  .d9-reason.empty { color:#bbb; font-style:italic; font-family:'Crimson Pro',Georgia,serif; font-size:9pt; }

  /* Venn zones */
  .venn-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
  .venn-zone { border:1px solid #ddd; border-radius:4px; padding:7px 8px; }
  .vzone-label { font-family:'Cinzel',Georgia,serif; font-size:6.5pt; letter-spacing:.08em; text-transform:uppercase; margin-bottom:5px; }
  .vzone.maya  .vzone-label { color:#b8733a; }
  .vzone.saxon .vzone-label { color:#4a7fa8; }
  .vzone.islam .vzone-label { color:#7a4fa8; }
  .vzone.ms    .vzone-label { color:#c45a90; }
  .vzone.mi    .vzone-label { color:#c47820; }
  .vzone.si    .vzone-label { color:#5a6ea8; }
  .vzone.all   .vzone-label { color:#8a8a2a; }
  .vzone-items { font-family:'TwinklCursive','Crimson Pro',Georgia,serif; font-size:10pt; line-height:1.65; color:#1a1a2e; }
  .vzone-items.empty { font-family:'Crimson Pro',Georgia,serif; font-size:8.5pt; color:#bbb; font-style:italic; }

  .no-data { font-size:8.5pt; color:#aaa; font-style:italic; padding:6px 0; font-family:'Crimson Pro',Georgia,serif; }

  /* ── PRINT ── */
  @media print {
    body { background:#fff; }
    .screen-header, .screen-main > *:not(.a4-sheet) { display:none !important; }
    .screen-main { max-width:none; margin:0; padding:0; gap:0; }
    .a4-sheet { width:210mm; max-width:none; min-height:297mm; margin:0; padding:16mm 18mm; border:none; box-shadow:none; page-break-after:always; }
  }
</style>
</head>
<body>

<div class="screen-header">
  <div>
    <div class="eyebrow">Teacher View · Lesson 7 · Maya Enquiry</div>
    <h1>Print View — Venn Diagram &amp; Diamond Nine</h1>
  </div>
  <div class="hdr-right">
    <div class="live-dot"></div>
    <button class="screen-btn btn-refresh" onclick="load()">↺ Refresh</button>
    <button class="screen-btn btn-print" onclick="window.print()">🖨 Print All</button>
  </div>
</div>

<div class="screen-main" id="main">
  <div class="status" id="status">Loading data…</div>
</div>

<script>
const VENN_CSV     = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQNqr1dLDto9DsqIrTYAmK4aay6J6d9AHv0QHmJazO-I42Mx1uDhzKtb0YFvivALTnnfp74fE3hnJVc/pub?gid=0&single=true&output=csv';
const DIAMOND_CSV  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRPRURE9g1iYKrOtQCF3PMwggQDR2qeudR7fzOStsUr_L-ZvNvPRoW2Q0nEFFNsDAFaA7Ow8VuGAVDI/pub?gid=0&single=true&output=csv';

function splitCSV(line) {
  const r=[]; let c='',q=false;
  for(const ch of line){if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else{c+=ch;}}
  r.push(c.trim()); return r;
}
function normName(n) { return (n||'').toLowerCase().replace(/[^a-z0-9]/g,''); }

async function fetchCSV(url) {
  const res   = await fetch(url + '&t=' + Date.now());
  const text  = await res.text();
  const lines = text.trim().split('\n').filter(l=>l.trim());
  if (lines.length < 2) return [];
  const headers = splitCSV(lines[0]).map(h=>h.trim().toLowerCase());
  return lines.slice(1).map(l => {
    const cols = splitCSV(l);
    const obj  = {};
    headers.forEach((h,i) => obj[h] = cols[i]||'');
    return obj;
  });
}

function latestByName(rows) {
  const map = {};
  rows.forEach(r => {
    const key = normName(r.name || r.names || '');
    if (!key) return;
    if (!map[key] || r.timestamp > map[key].timestamp) map[key] = r;
  });
  return map;
}

async function load() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="status">Loading…</div>';
  try {
    const [vennRows, d9Rows] = await Promise.all([
      fetchCSV(VENN_CSV).catch(()=>[]),
      fetchCSV(DIAMOND_CSV).catch(()=>[]),
    ]);

    // Venn uses 'names', Diamond Nine uses 'name'
    const vennMap = latestByName(vennRows.map(r => ({...r, name: r.names||r.name||''})));
    const d9Map   = latestByName(d9Rows);

    const allKeys = new Set([...Object.keys(vennMap), ...Object.keys(d9Map)]);
    if (!allKeys.size) {
      main.innerHTML = '<div class="status">No submissions yet across either activity.</div>';
      return;
    }
    main.innerHTML = '';

    const entries = [...allKeys].map(key => {
      const displayName = (vennMap[key]||d9Map[key])?.names || (vennMap[key]||d9Map[key])?.name || key;
      return { key, displayName };
    }).sort((a,b) => a.displayName.localeCompare(b.displayName));

    entries.forEach(({ key, displayName }) => {
      main.appendChild(buildSheet(displayName, vennMap[key]||null, d9Map[key]||null));
    });
  } catch(e) {
    main.innerHTML = `<div class="status">Could not load — check both sheets are published as CSV.<br><small>${e.message}</small></div>`;
  }
}

function items(str) {
  if (!str || str === '—') return [];
  return str.split('|').map(s=>s.trim()).filter(Boolean);
}

function buildSheet(name, venn, d9) {
  const sheet = document.createElement('div');
  sheet.className = 'a4-sheet';
  const date = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

  // ── DIAMOND NINE ──────────────────────────────────────────────────
  let d9HTML = '';
  if (d9) {
    const topReason = d9.topreason || d9['top reason'] || '';
    const botReason = d9.bottomreason || d9['bottom reason'] || '';
    d9HTML = `
      <div class="d9-grid">
        <div class="d9-card top">
          <div class="d9-card-pos">★ Most Important (Position 1)</div>
          <div class="d9-card-name">${d9.topcard || d9['top card'] || '—'}</div>
          <div class="d9-reason-label">Why is this most important?</div>
          <div class="d9-reason ${topReason ? '' : 'empty'}">${topReason || 'No reason given'}</div>
        </div>
        <div class="d9-card">
          <div class="d9-card-pos">◇ Least Important (Position 9)</div>
          <div class="d9-card-name">${d9.bottomcard || d9['bottom card'] || '—'}</div>
          <div class="d9-reason-label">Why is this least important?</div>
          <div class="d9-reason ${botReason ? '' : 'empty'}">${botReason || 'No reason given'}</div>
        </div>
      </div>`;
  } else {
    d9HTML = '<div class="no-data">No Diamond Nine submission recorded.</div>';
  }

  // ── VENN DIAGRAM ──────────────────────────────────────────────────
  const ZONES = [
    { key:'mayaonly',   cls:'maya',  label:'🏺 Maya Only' },
    { key:'saxononly',  cls:'saxon', label:'⚔️ Saxon Only' },
    { key:'islamonly',  cls:'islam', label:'🌙 Islam Only' },
    { key:'mayasaxon',  cls:'ms',    label:'Maya + Saxon' },
    { key:'mayaislam',  cls:'mi',    label:'Maya + Islam' },
    { key:'saxonislam', cls:'si',    label:'Saxon + Islam' },
    { key:'allthree',   cls:'all',   label:'★ All Three' },
  ];

  let vennHTML = '';
  if (venn) {
    vennHTML = `<div class="venn-grid">${ZONES.map(z => {
      const list = items(venn[z.key] || venn[z.key.replace(/([a-z])([A-Z])/g,'$1 $2').toLowerCase()] || '');
      const content = list.length
        ? list.map(i=>`<div>${i}</div>`).join('')
        : '—';
      const isEmpty = !list.length;
      return `<div class="venn-zone vzone ${z.cls}">
        <div class="vzone-label">${z.label}</div>
        <div class="vzone-items ${isEmpty?'empty':''}">${content}</div>
      </div>`;
    }).join('')}</div>`;
  } else {
    vennHTML = '<div class="no-data">No Venn Diagram submission recorded.</div>';
  }

  sheet.innerHTML = `
    <div class="sheet-header">
      <div>
        <div class="sheet-title">Lesson 7 — Comparing &amp; Ranking</div>
        <div class="sheet-subtitle">Maya Enquiry · Year 4 · ${date}</div>
      </div>
      <div class="sheet-name-box">
        <div class="sheet-name-label">Trio</div>
        <div class="sheet-name">${name}</div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">◆ Diamond Nine — Who Mattered Most?</span>
        <span class="section-badge">Cat 5 · Metacognition</span>
      </div>
      <div class="section-body">${d9HTML}</div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">🔵 Three-Way Venn Diagram — Comparing Hierarchies</span>
        <span class="section-badge">Cat 4 · Application</span>
      </div>
      <div class="section-body">${vennHTML}</div>
    </div>`;

  return sheet;
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
