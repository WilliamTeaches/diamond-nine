<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson 7 · Print View</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family:'TwinklCursive';
    src:url('TwinklCursiveLooped-Regular.ttf') format('truetype');
    font-weight:normal; font-style:normal;
  }

  :root {
    --gold:#c9a84c; --gold-lt:#e9c46a;
    --stone-dk:#140a04; --cream:#f5edd6; --sand:#e8d5b0;
    --jade:#2d6a4f; --jade-lt:#40916c;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Crimson Pro',Georgia,serif; background:#e8e4dc; color:#1a1a1a; min-height:100vh; }

  /* ── SCREEN CHROME ── */
  .screen-header {
    background:linear-gradient(180deg,#0d0604 0%,rgba(13,6,4,.9) 100%);
    border-bottom:2px solid var(--gold); padding:10px 20px;
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
    position:sticky; top:0; z-index:100;
  }
  .eyebrow { font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.2em; color:var(--gold); text-transform:uppercase; margin-bottom:2px; }
  .screen-header h1 { font-family:'Cinzel',serif; font-size:clamp(.85rem,1.8vw,1.2rem); font-weight:700; color:var(--gold-lt); }
  .hdr-right { display:flex; gap:8px; align-items:center; }
  .live-dot { width:8px; height:8px; border-radius:50%; background:var(--jade-lt); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  .screen-btn { font-family:'Cinzel',serif; font-size:.62rem; letter-spacing:.1em; text-transform:uppercase; padding:9px 18px; border:none; border-radius:5px; cursor:pointer; transition:all .2s; }
  .btn-print { background:linear-gradient(135deg,var(--gold) 0%,#a8832a 100%); color:#1e0f07; }
  .btn-refresh { background:transparent; color:var(--sand); border:1px solid rgba(201,168,76,.4); }

  .screen-main { max-width:220mm; margin:20px auto; padding:0 12px 60px; display:flex; flex-direction:column; gap:20px; }
  .status { text-align:center; padding:60px 20px; font-family:'Cinzel',serif; font-size:.78rem; letter-spacing:.1em; color:rgba(26,26,26,.45); text-transform:uppercase; }

  /* ── A4 SHEET — exact 210×297mm ── */
  .a4-sheet {
    background:#fff;
    width:210mm;
    min-height:297mm;
    margin:0 auto;
    padding:12mm 14mm;
    border:1px solid #bbb;
    box-shadow:0 3px 20px rgba(0,0,0,.15);
    display:flex;
    flex-direction:column;
    gap:6mm;
    page-break-after:always;
  }

  /* ── COMPACT HEADER ── */
  .sheet-header {
    display:flex; align-items:center; justify-content:space-between; gap:8mm;
    padding-bottom:4mm; border-bottom:1.5pt solid #1a1a2e; flex-shrink:0;
  }
  .sheet-title-block {}
  .sheet-enquiry {
    font-family:'Cinzel',Georgia,serif; font-size:7pt; letter-spacing:.06em;
    text-transform:uppercase; color:#888; margin-bottom:2pt;
  }
  .sheet-title {
    font-family:'Cinzel',Georgia,serif; font-size:11pt; font-weight:700; color:#1a1a2e; line-height:1.2;
  }
  .sheet-date { font-family:'Cinzel',Georgia,serif; font-size:6.5pt; color:#aaa; margin-top:1pt; }
  .sheet-name-box {
    border:1pt solid #1a1a2e; border-radius:3pt; padding:4pt 10pt; text-align:center; min-width:40mm; flex-shrink:0;
  }
  .sheet-name-label { font-family:'Cinzel',Georgia,serif; font-size:6pt; text-transform:uppercase; letter-spacing:.1em; color:#999; }
  .sheet-name { font-family:'TwinklCursive','Crimson Pro',Georgia,serif; font-size:12pt; color:#1a1a2e; margin-top:2pt; line-height:1.2; }

  /* ── TWO COL BODY ── */
  .body-cols {
    display:grid; grid-template-columns:1fr 1fr; gap:5mm; flex:1;
  }

  /* ── SECTION ── */
  .section { border:0.5pt solid #ddd; border-radius:3pt; overflow:hidden; display:flex; flex-direction:column; }
  .section-title-bar { padding:3pt 8pt; border-bottom:0.5pt solid #ddd; }
  .section-title { font-family:'Cinzel',Georgia,serif; font-size:7pt; letter-spacing:.08em; text-transform:uppercase; color:#444; }
  .section-body { padding:6pt 8pt; flex:1; }

  /* ── DIAMOND NINE ── */
  .diamond-grid {
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    grid-template-rows:repeat(5,auto);
    gap:2.5pt;
    margin-bottom:5pt;
  }
  .d-card {
    border:0.5pt solid #ccc; border-radius:3pt; padding:3pt 2pt;
    text-align:center; background:#fafafa;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:16mm;
  }
  .d-card.top-card { border-color:#c9a84c; background:#fffcf0; }
  .d-card.bot-card { background:#f6f6f6; }
  .d-card.empty-card { border-style:dashed; border-color:#e0e0e0; background:#fff; }
  .d-pos  { font-family:'Cinzel',Georgia,serif; font-size:5pt; color:#bbb; margin-bottom:1pt; }
  .d-card.top-card .d-pos { color:#c9a84c; }
  .d-icon { font-size:10pt; line-height:1; margin-bottom:1pt; }
  .d-name { font-family:'Cinzel',Georgia,serif; font-size:5.5pt; letter-spacing:.03em; text-transform:uppercase; color:#1a1a2e; line-height:1.2; }

  /* positions */
  .pos-1 { grid-column:2; grid-row:1; }
  .pos-2 { grid-column:1; grid-row:2; }
  .pos-3 { grid-column:3; grid-row:2; }
  .pos-4 { grid-column:1; grid-row:3; }
  .pos-5 { grid-column:2; grid-row:3; }
  .pos-6 { grid-column:3; grid-row:3; }
  .pos-7 { grid-column:1; grid-row:4; }
  .pos-8 { grid-column:3; grid-row:4; }
  .pos-9 { grid-column:2; grid-row:5; }

  /* Reason boxes */
  .reason-box { border:0.5pt solid #e0e0e0; border-radius:3pt; padding:5pt 7pt; margin-bottom:3pt; background:#fafafa; }
  .reason-box.top-box { border-color:#c9a84c; background:#fffcf0; }
  .reason-label { font-family:'Cinzel',Georgia,serif; font-size:6pt; text-transform:uppercase; letter-spacing:.07em; color:#aaa; margin-bottom:3pt; }
  .reason-label.top { color:#a8832a; }
  .reason-text { font-family:'TwinklCursive','Crimson Pro',Georgia,serif; font-size:10.5pt; line-height:1.55; color:#1a1a2e; min-height:14pt; }
  .reason-text.empty { font-family:'Crimson Pro',Georgia,serif; font-size:8pt; color:#bbb; font-style:italic; }
  .no-data { font-family:'Crimson Pro',Georgia,serif; font-size:8pt; color:#bbb; font-style:italic; padding:4pt 0; }

  /* ── VENN ── */
  .venn-wrap { position:relative; width:100%; }
  .venn-svg  { width:100%; height:auto; display:block; }
  .venn-overlay { position:absolute; inset:0; pointer-events:none; }
  .vzone {
    position:absolute;
    display:flex; flex-direction:column; align-items:center;
    font-family:'TwinklCursive','Crimson Pro',Georgia,serif;
    font-size:6.5pt; line-height:1.35; text-align:center; color:#1a1a2e;
    overflow:hidden;
  }
  .vzone-label {
    font-family:'Cinzel',Georgia,serif;
    font-size:5pt; letter-spacing:.06em; text-transform:uppercase; color:#777; margin-bottom:1.5pt;
  }
  .vzone-item { margin-bottom:0.5pt; }

  /* ── PRINT ── */
  @media print {
    body { background:#fff; margin:0; padding:0; }
    .screen-header { display:none !important; }
    .screen-main { max-width:none; margin:0; padding:0; gap:0; }
    .a4-sheet {
      width:210mm; min-height:297mm;
      margin:0; padding:12mm 14mm;
      border:none; box-shadow:none;
      page-break-after:always;
    }
  }
</style>
</head>
<body>

<div class="screen-header">
  <div>
    <div class="eyebrow">Teacher View · Lesson 7 · Maya Enquiry</div>
    <h1>Print View — Venn Diagram &amp; Diamond Nine</h1>
  </div>
  <div class="hdr-right">
    <div class="live-dot"></div>
    <button class="screen-btn btn-refresh" onclick="load()">↺ Refresh</button>
    <button class="screen-btn btn-print"   onclick="window.print()">🖨 Print All</button>
  </div>
</div>

<div class="screen-main" id="main">
  <div class="status" id="status">Loading data…</div>
</div>

<script>
const VENN_CSV    = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQNqr1dLDto9DsqIrTYAmK4aay6J6d9AHv0QHmJazO-I42Mx1uDhzKtb0YFvivALTnnfp74fE3hnJVc/pub?gid=0&single=true&output=csv';
const DIAMOND_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRPRURE9g1iYKrOtQCF3PMwggQDR2qeudR7fzOStsUr_L-ZvNvPRoW2Q0nEFFNsDAFaA7Ow8VuGAVDI/pub?gid=0&single=true&output=csv';

const D9_CARDS = {
  'The King':'👑','Nobles':'⚔️','Farmers':'🌽','Artisans':'🏺',
  'Slaves':'⛓️','Animal Companions':'🐆','Divine Right':'☀️',
  'Unpaid Labour':'🔨','Ahau Pacal Votan':'🌟',
};

function splitCSV(line) {
  const r=[]; let c='',q=false;
  for(const ch of line){if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else{c+=ch;}}
  r.push(c.trim()); return r;
}

// Normalise name — just letters and digits, lowercase
function norm(n) { return (n||'').toLowerCase().replace(/[^a-z0-9]/g,''); }

// Fuzzy match: check if any word in one name appears in the other
function namesMatch(a, b) {
  if (!a || !b) return false;
  const na = norm(a), nb = norm(b);
  if (na === nb) return true;
  if (na.includes(nb) || nb.includes(na)) return true;
  // Split on non-word chars and check word overlap
  const wordsA = a.toLowerCase().split(/[^a-z]+/).filter(w=>w.length>2);
  const wordsB = b.toLowerCase().split(/[^a-z]+/).filter(w=>w.length>2);
  return wordsA.some(w => wordsB.includes(w));
}

async function fetchCSV(url) {
  const res   = await fetch(url + '&t=' + Date.now());
  const text  = await res.text();
  const lines = text.trim().split('\n').filter(l=>l.trim());
  if (lines.length < 2) return [];
  const headers = splitCSV(lines[0]).map(h=>h.trim().toLowerCase());
  return lines.slice(1).map(l => {
    const cols = splitCSV(l);
    const obj  = {};
    headers.forEach((h,i) => obj[h] = cols[i]||'');
    return obj;
  });
}

// Keep the latest row per name
function latestByName(rows, field) {
  const map = {};
  rows.forEach(r => {
    const raw = r[field] || '';
    const key = norm(raw);
    if (!key) return;
    if (!map[key] || r.timestamp > map[key].timestamp) map[key] = { ...r, _raw: raw };
  });
  return map;
}

async function load() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="status">Loading…</div>';
  try {
    const [vennRows, d9Rows] = await Promise.all([
      fetchCSV(VENN_CSV).catch(()=>[]),
      fetchCSV(DIAMOND_CSV).catch(()=>[]),
    ]);

    const vennMap = latestByName(vennRows, 'names');
    const d9Map   = latestByName(d9Rows,   'name');

    // Build entries from Venn (primary) then add any D9-only entries
    const entries = [];
    const matchedD9 = new Set();

    Object.entries(vennMap).forEach(([vKey, vRow]) => {
      // Find best-matching D9 entry
      let d9Row = d9Map[vKey] || null; // exact match first
      if (!d9Row) {
        // Fuzzy match
        for (const [dKey, dRow] of Object.entries(d9Map)) {
          if (namesMatch(vRow._raw, dRow._raw)) { d9Row = dRow; matchedD9.add(dKey); break; }
        }
      } else {
        matchedD9.add(vKey);
      }
      entries.push({ displayName: vRow._raw, venn: vRow, d9: d9Row });
    });

    // D9 entries with no Venn match
    Object.entries(d9Map).forEach(([dKey, dRow]) => {
      if (!matchedD9.has(dKey)) {
        entries.push({ displayName: dRow._raw, venn: null, d9: dRow });
      }
    });

    if (!entries.length) {
      main.innerHTML = '<div class="status">No submissions yet.</div>';
      return;
    }

    entries.sort((a,b) => a.displayName.localeCompare(b.displayName));
    main.innerHTML = '';
    entries.forEach(e => main.appendChild(buildSheet(e.displayName, e.venn, e.d9)));
  } catch(e) {
    main.innerHTML = `<div class="status">Could not load.<br><small>${e.message}</small></div>`;
  }
}

// ── DIAMOND NINE ──────────────────────────────────────────────────────
function buildDiamond(d9) {
  if (!d9) return '<div class="no-data">No Diamond Nine submission recorded.</div>';

  const topCard   = d9.topcard    || d9['top card']    || '';
  const botCard   = d9.bottomcard || d9['bottom card'] || '';
  const topReason = d9.topreason  || d9['top reason']  || '';
  const botReason = d9.bottomreason || d9['bottom reason'] || '';

  // Middle 7 positions are placeholders (we only receive top and bottom)
  const midCards = ['Nobles','Farmers','Artisans','Slaves','Animal Companions','Divine Right','Unpaid Labour']
    .filter(c => c !== topCard && c !== botCard);

  const positions = [
    { pos:1, name:topCard,      isTop:true },
    { pos:2, name:midCards[0]||'', },
    { pos:3, name:midCards[1]||'', },
    { pos:4, name:midCards[2]||'', },
    { pos:5, name:midCards[3]||'', },
    { pos:6, name:midCards[4]||'', },
    { pos:7, name:midCards[5]||'', },
    { pos:8, name:midCards[6]||'', },
    { pos:9, name:botCard,      isBot:true },
  ];

  const cells = positions.map(p => {
    const icon = D9_CARDS[p.name] || '';
    const cls  = p.isTop ? 'top-card' : p.isBot ? 'bot-card' : (p.name ? '' : 'empty-card');
    const posLabel = p.isTop ? '★ Most important' : p.isBot ? '◇ Least important' : `${p.pos}`;
    return `<div class="d-card pos-${p.pos} ${cls}">
      <div class="d-pos">${posLabel}</div>
      ${p.name ? `<div class="d-icon">${icon}</div><div class="d-name">${p.name}</div>` : ''}
    </div>`;
  }).join('');

  return `
    <div class="diamond-grid">${cells}</div>
    <div class="reason-box top-box">
      <div class="reason-label top">Why is "${topCard || '—'}" most important?</div>
      <div class="reason-text ${topReason?'':'empty'}">${topReason || 'No reason recorded'}</div>
    </div>
    <div class="reason-box">
      <div class="reason-label">Why is "${botCard || '—'}" least important?</div>
      <div class="reason-text ${botReason?'':'empty'}">${botReason || 'No reason recorded'}</div>
    </div>`;
}

// ── VENN DIAGRAM ──────────────────────────────────────────────────────
function buildVenn(venn) {
  if (!venn) return '<div class="no-data">No Venn Diagram submission recorded.</div>';

  function items(str) {
    if (!str || str==='—') return [];
    return str.split('|').map(s=>s.trim()).filter(Boolean);
  }
  const Z = {
    mo: items(venn.mayaonly  || ''),
    so: items(venn.saxononly || ''),
    io: items(venn.islamonly || ''),
    ms: items(venn.mayasaxon || ''),
    mi: items(venn.mayaislam || ''),
    si: items(venn.saxonislam|| ''),
    al: items(venn.allthree  || ''),
  };

  function txt(list, max=3) {
    if (!list.length) return '';
    return list.slice(0,max).map(t=>`<div class="vzone-item">${t.length>32?t.slice(0,30)+'…':t}</div>`).join('')
      + (list.length>max ? `<div class="vzone-item" style="opacity:.5;font-family:'Crimson Pro'">+${list.length-max}</div>` : '');
  }

  return `<div class="venn-wrap">
    <svg class="venn-svg" viewBox="0 0 380 300" xmlns="http://www.w3.org/2000/svg">
      <circle cx="148" cy="118" r="108" fill="rgba(184,115,58,.1)" stroke="rgba(184,115,58,.75)" stroke-width="1.2"/>
      <circle cx="232" cy="118" r="108" fill="rgba(74,127,168,.1)"  stroke="rgba(74,127,168,.75)"  stroke-width="1.2"/>
      <circle cx="190" cy="203" r="108" fill="rgba(122,79,168,.1)"  stroke="rgba(122,79,168,.75)"  stroke-width="1.2"/>
      <text x="72"  y="36" font-family="Cinzel,serif" font-size="8.5" font-weight="700" fill="#b8733a" text-anchor="middle">🏺 Maya</text>
      <text x="308" y="36" font-family="Cinzel,serif" font-size="8.5" font-weight="700" fill="#4a7fa8" text-anchor="middle">⚔️ Saxon</text>
      <text x="190" y="296" font-family="Cinzel,serif" font-size="8.5" font-weight="700" fill="#7a4fa8" text-anchor="middle">🌙 Islam</text>
    </svg>
    <div class="venn-overlay">
      <div class="vzone" style="left:1%;top:20%;width:20%;max-height:22%">
        <div class="vzone-label">Maya only</div>${txt(Z.mo)}
      </div>
      <div class="vzone" style="left:38%;top:6%;width:24%;max-height:18%">
        <div class="vzone-label">Maya + Saxon</div>${txt(Z.ms,2)}
      </div>
      <div class="vzone" style="right:1%;top:20%;width:20%;max-height:22%">
        <div class="vzone-label">Saxon only</div>${txt(Z.so)}
      </div>
      <div class="vzone" style="left:11%;top:54%;width:20%;max-height:22%">
        <div class="vzone-label">Maya + Islam</div>${txt(Z.mi,2)}
      </div>
      <div class="vzone" style="left:35%;top:44%;width:30%;max-height:24%">
        <div class="vzone-label">All three</div>${txt(Z.al,3)}
      </div>
      <div class="vzone" style="right:11%;top:54%;width:20%;max-height:22%">
        <div class="vzone-label">Saxon + Islam</div>${txt(Z.si,2)}
      </div>
      <div class="vzone" style="left:37%;top:76%;width:26%;max-height:18%">
        <div class="vzone-label">Islam only</div>${txt(Z.io,2)}
      </div>
    </div>
  </div>`;
}

// ── BUILD SHEET ───────────────────────────────────────────────────────
function buildSheet(name, venn, d9) {
  const sheet = document.createElement('div');
  sheet.className = 'a4-sheet';
  const date = new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});

  sheet.innerHTML = `
    <div class="sheet-header">
      <div class="sheet-title-block">
        <div class="sheet-enquiry">What was the legacy of the Ancient Mayans?</div>
        <div class="sheet-title">Comparing Civilisations &amp; Ranking Roles and Resources</div>
        <div class="sheet-date">${date}</div>
      </div>
      <div class="sheet-name-box">
        <div class="sheet-name-label">Trio</div>
        <div class="sheet-name">${name}</div>
      </div>
    </div>

    <div class="body-cols">
      <div class="section">
        <div class="section-title-bar">
          <div class="section-title">◆ Diamond Nine — Who Mattered Most?</div>
        </div>
        <div class="section-body">${buildDiamond(d9)}</div>
      </div>
      <div class="section">
        <div class="section-title-bar">
          <div class="section-title">🔵 Venn Diagram — Comparing Hierarchies</div>
        </div>
        <div class="section-body">${buildVenn(venn)}</div>
      </div>
    </div>`;

  return sheet;
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
