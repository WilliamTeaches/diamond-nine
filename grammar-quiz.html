<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Writing Skills Quiz · Lesson 4</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#c9a84c; --gold-lt:#e9c46a;
    --stone-dk:#140a04; --cream:#f5edd6; --sand:#e8d5b0;
    --jade:#2d6a4f; --jade-lt:#40916c;
    --terra:#c1440e;
    --correct:#2d6a4f; --correct-lt:#40916c;
    --wrong:#9b2c0c; --wrong-lt:#c1440e;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;font-family:'Crimson Pro',Georgia,serif;
    background:var(--stone-dk);color:var(--cream);overflow:hidden;
    overscroll-behavior:none;user-select:none;-webkit-user-select:none;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px),
    repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);}

  .page{display:grid;grid-template-rows:auto 1fr auto;height:100vh;position:relative;z-index:1;}

  /* HEADER */
  header{background:linear-gradient(180deg,#0d0604 0%,rgba(13,6,4,.85) 100%);
    border-bottom:2px solid var(--gold);padding:9px 16px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;flex-shrink:0;}
  .eyebrow{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;}
  h1{font-family:'Cinzel',serif;font-size:clamp(.85rem,2vw,1.15rem);font-weight:700;color:var(--gold-lt);}
  .name-bar{display:flex;align-items:center;gap:7px;}
  .name-bar label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;white-space:nowrap;}
  .name-bar input{background:rgba(0,0,0,.4);border:1px solid rgba(201,168,76,.4);border-radius:4px;
    color:var(--cream);font-family:'Crimson Pro',serif;font-size:16px;padding:5px 9px;outline:none;width:170px;}
  .name-bar input:focus{border-color:var(--gold);}
  .name-bar input::placeholder{color:rgba(245,237,214,.3);font-style:italic;}

  /* PROGRESS */
  .prog-bar{height:3px;background:rgba(201,168,76,.12);flex-shrink:0;}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--jade-lt),var(--gold));transition:width .4s ease;}

  /* QUESTION AREA */
  .q-area{display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:32px 28px;gap:26px;overflow:hidden;}

  .q-counter{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.16em;color:rgba(201,168,76,.5);text-transform:uppercase;}

  .q-text{font-size:clamp(1.2rem,3vw,1.7rem);line-height:1.5;color:var(--cream);
    text-align:center;max-width:680px;}
  .q-text u { text-decoration:underline; text-underline-offset:4px; }

  .q-hint{font-size:clamp(.85rem,1.6vw,1rem);font-style:italic;color:rgba(232,213,176,.45);text-align:center;}

  /* ANSWER OPTIONS */
  .options{display:flex;flex-direction:column;gap:12px;width:100%;max-width:640px;}
  .opt-btn{
    width:100%;padding:18px 22px;border-radius:12px;cursor:pointer;
    border:1.5px solid rgba(201,168,76,.25);background:rgba(0,0,0,.3);
    color:var(--sand);font-family:'Crimson Pro',serif;font-size:clamp(1rem,2vw,1.2rem);
    line-height:1.4;text-align:left;transition:all .18s;
    touch-action:manipulation;-webkit-tap-highlight-color:transparent;min-height:64px;
  }
  .opt-btn:active{background:rgba(201,168,76,.12);border-color:var(--gold);}
  .opt-btn.selected-correct{background:rgba(45,106,79,.3);border-color:var(--jade-lt);color:#8ee8b0;}
  .opt-btn.selected-wrong{background:rgba(155,44,12,.3);border-color:var(--wrong-lt);color:#f09080;}
  .opt-btn.show-correct{background:rgba(45,106,79,.2);border-color:rgba(64,145,108,.5);color:#74c99a;}
  .opt-btn:disabled{cursor:default;}

  /* FEEDBACK */
  .feedback{
    max-width:640px;width:100%;padding:14px 18px;border-radius:8px;
    font-size:clamp(.92rem,1.7vw,1.05rem);line-height:1.55;text-align:center;
    opacity:0;transition:opacity .25s;
  }
  .feedback.show{opacity:1;}
  .feedback.correct{background:rgba(45,106,79,.25);border:1px solid rgba(64,145,108,.45);color:#74c99a;}
  .feedback.wrong{background:rgba(155,44,12,.22);border:1px solid rgba(193,68,14,.45);color:#f09070;}

  /* NAV ROW */
  .nav-row{display:flex;align-items:center;justify-content:center;gap:14px;
    padding:12px 16px;flex-shrink:0;background:rgba(0,0,0,.2);border-top:1px solid rgba(255,255,255,.06);}
  .nav-btn{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;
    padding:12px 28px;border:1px solid rgba(201,168,76,.4);border-radius:6px;
    background:rgba(201,168,76,.07);color:var(--gold-lt);cursor:pointer;transition:all .18s;
    touch-action:manipulation;min-height:44px;-webkit-tap-highlight-color:transparent;}
  .nav-btn:active{background:rgba(201,168,76,.2);border-color:var(--gold);}
  .nav-btn:disabled{opacity:.3;cursor:default;}

  /* FOOTER */
  footer{background:rgba(0,0,0,.5);border-top:1px solid rgba(201,168,76,.2);
    padding:7px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;}
  .score-display{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;
    color:rgba(232,213,176,.45);text-transform:uppercase;}

  /* COMPLETE SCREEN */
  .complete-overlay{position:absolute;inset:0;background:rgba(20,10,4,.96);z-index:10;
    display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;text-align:center;padding:28px 24px;}
  .complete-overlay.show{display:flex;}
  .complete-icon{font-size:3rem;}
  .complete-title{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;color:var(--gold-lt);}
  .complete-score{font-family:'Cinzel',serif;font-size:2.5rem;font-weight:700;color:var(--jade-lt);line-height:1;}
  .complete-sub{font-size:.95rem;font-style:italic;color:var(--sand);line-height:1.6;}
  .submit-name-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:320px;}
  .submit-name-label{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;}
  .submit-name-input{width:100%;background:rgba(0,0,0,.5);border:1.5px solid rgba(201,168,76,.5);
    border-radius:8px;color:var(--cream);font-family:'Crimson Pro',serif;font-size:16px;
    padding:12px 16px;outline:none;text-align:center;transition:border-color .2s;}
  .submit-name-input:focus{border-color:var(--gold-lt);}
  .submit-name-input::placeholder{color:rgba(245,237,214,.3);font-style:italic;}
  .submit-btn{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;
    padding:15px 36px;border:none;border-radius:8px;cursor:pointer;transition:all .2s;
    background:linear-gradient(135deg,var(--gold) 0%,#a8832a 100%);
    color:#1e0f07;box-shadow:0 4px 16px rgba(201,168,76,.35);
    touch-action:manipulation;min-height:52px;width:100%;max-width:320px;}
  .submit-btn:active{transform:translateY(1px);}
  .submit-btn:disabled{opacity:.4;cursor:default;}
  .submit-feedback{font-size:.82rem;font-style:italic;color:var(--jade-lt);min-height:1.2em;}

  #toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(60px);
    background:var(--jade);color:var(--cream);padding:10px 20px;border-radius:7px;
    font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;
    border:1px solid var(--jade-lt);box-shadow:0 8px 24px rgba(0,0,0,.6);
    transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;pointer-events:none;max-width:88vw;text-align:center;}
  #toast.show{transform:translateX(-50%) translateY(0);}
  #toast.error{background:var(--terra);border-color:#e06030;}
</style>
</head>
<body>
<div class="page">

  <header>
    <div>
      <div class="eyebrow">Lesson 4 · Grammar Opener · Year 4 Writing Skills</div>
      <h1>What do you already know about writing?</h1>
    </div>
    <div class="name-bar">
      <label for="pupil-name">Name:</label>
      <input type="text" id="pupil-name" placeholder="Your name…" autocomplete="off">
    </div>
  </header>

  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

  <div class="q-area" id="q-area">
    <div class="q-counter" id="q-counter">Question 1 of 7</div>
    <div class="q-text"   id="q-text"></div>
    <div class="q-hint"   id="q-hint"></div>
    <div class="options"  id="options"></div>
    <div class="feedback" id="feedback"></div>

    <!-- Complete screen -->
    <div class="complete-overlay" id="complete-overlay">
      <div class="complete-icon">📜</div>
      <div class="complete-title">Quiz complete!</div>
      <div class="complete-score" id="complete-score"></div>
      <div class="complete-sub" id="complete-sub"></div>
      <div class="submit-name-wrap">
        <label class="submit-name-label" for="submit-name">Your name</label>
        <input class="submit-name-input" type="text" id="submit-name" placeholder="e.g. Amara" autocomplete="off">
      </div>
      <button class="submit-btn" id="submit-btn" onclick="submitResults()">Share with teacher ◆</button>
      <div class="submit-feedback" id="submit-feedback"></div>
    </div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="btn-next" onclick="next()" disabled>Next →</button>
  </div>

  <footer>
    <div class="score-display" id="score-display">Score: 0 / 0</div>
    <div class="score-display" id="prog-display">Question 1 of 7</div>
  </footer>
</div>

<div id="toast"></div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzakm_M_Fpsz8y75P8GVhlH7qcntREqTTVHtQ3kHbjkmCaYihvXD3U6FjKzZCJkij8P/exec';

const QUESTIONS = [
  {
    q: 'Which of these is an expanded noun phrase?',
    hint: 'An expanded noun phrase adds detail to a noun using adjectives or other words.',
    options: [
      'The temple stood tall.',
      'The towering stone temple in the jungle.',
      'They built the temple quickly.',
    ],
    correct: 1,
    feedback: {
      correct: '"The towering stone temple in the jungle" is an expanded noun phrase — it describes the noun (temple) with adjectives and a prepositional phrase. There\'s no verb, so it\'s not a sentence on its own.',
      wrong: 'An expanded noun phrase describes a noun in detail but has no verb. "The towering stone temple in the jungle" is the expanded noun phrase here.',
    }
  },
  {
    q: 'Which sentence uses a fronted adverbial correctly?',
    hint: 'A fronted adverbial comes at the START of a sentence and is usually followed by a comma.',
    options: [
      'The Maya priest climbed the temple slowly.',
      'Slowly, the Maya priest climbed the temple.',
      'The Maya priest slowly climbed the temple.',
    ],
    correct: 1,
    feedback: {
      correct: '"Slowly," is a fronted adverbial — the adverb comes first, before the subject, and is followed by a comma.',
      wrong: 'A fronted adverbial goes at the START of the sentence, before the subject, and needs a comma after it. "Slowly, the Maya priest climbed the temple." is correct.',
    }
  },
  {
    q: 'Which word is a subordinating conjunction?',
    hint: 'Subordinating conjunctions join a main clause to a subordinate clause.',
    options: ['and', 'but', 'while'],
    correct: 2,
    feedback: {
      correct: '"While" is a subordinating conjunction — it introduces a subordinate clause that depends on the main clause. "And" and "but" are coordinating conjunctions that join two equal clauses.',
      wrong: '"While" is the subordinating conjunction. "And" and "but" are coordinating conjunctions — they join two equal clauses. "While" introduces a clause that depends on the main one, e.g. "While the farmers worked, the king ruled."',
    }
  },
  {
    q: 'Which sentence uses an apostrophe for possession correctly?',
    hint: 'Apostrophes for possession show that something belongs to someone.',
    options: [
      "The king's throne was decorated with gold.",
      "The kings throne was decorated with gold.",
      "The king's throne were decorated with gold.",
    ],
    correct: 0,
    feedback: {
      correct: '"The king\'s throne" is correct — the apostrophe before the \'s\' shows the throne belongs to the king.',
      wrong: 'When something belongs to a singular noun, we add apostrophe + s. "The king\'s throne" — the apostrophe shows it belongs to the king.',
    }
  },
  {
    q: 'What word class is the underlined word?\n"The Maya built <u>impressive</u> temples."',
    hint: 'Think about what job this word does in the sentence — does it name, describe, or show action?',
    options: ['A noun', 'An adjective', 'A verb'],
    correct: 1,
    feedback: {
      correct: '"Impressive" is an adjective — it describes the noun "temples". Adjectives give us more information about nouns.',
      wrong: '"Impressive" is an adjective. It describes the noun "temples". Nouns are naming words, verbs are doing/being words, and adjectives are describing words.',
    }
  },
  {
    q: 'Which sentence uses inverted commas correctly for direct speech?',
    hint: 'Inverted commas go around the exact words someone says.',
    options: [
      'The teacher said "the Maya were incredible builders".',
      '"The Maya were incredible builders," said the teacher.',
      'The teacher said, the Maya were incredible builders.',
    ],
    correct: 1,
    feedback: {
      correct: 'Correct! The inverted commas wrap the exact words spoken, the comma comes inside the closing inverted commas, and the reporting clause follows.',
      wrong: 'Inverted commas wrap the exact words spoken. The punctuation goes inside the closing inverted commas. The correct form is: "The Maya were incredible builders," said the teacher.',
    }
  },
  {
    q: 'Which of these is a compound sentence?',
    hint: 'A compound sentence joins two main clauses with a coordinating conjunction (for, and, nor, but, or, yet, so).',
    options: [
      'Although the Maya were powerful, their civilisation declined.',
      'The Maya built huge cities and they developed a number system.',
      'The Maya, who lived in Mesoamerica, built great temples.',
    ],
    correct: 1,
    feedback: {
      correct: '"The Maya built huge cities and they developed a number system" is compound — two main clauses joined by the coordinating conjunction "and". Both halves could stand alone as sentences.',
      wrong: 'A compound sentence joins two main clauses with a coordinating conjunction like "and", "but" or "so". "The Maya built huge cities and they developed a number system" is the compound sentence.',
    }
  },
];

let current = 0, score = 0, answered = false;
const answers = [];

function showQuestion() {
  const q = QUESTIONS[current];
  const total = QUESTIONS.length;

  document.getElementById('q-counter').textContent = `Question ${current + 1} of ${total}`;
  document.getElementById('prog-display').textContent = `Question ${current + 1} of ${total}`;
  document.getElementById('prog-fill').style.width = `${(current / total) * 100}%`;
  document.getElementById('q-text').innerHTML = q.q.replace(/\n/g, '<br>');
  document.getElementById('q-hint').textContent = q.hint;

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => answer(i);
    opts.appendChild(btn);
  });

  answered = false;
  document.getElementById('btn-next').disabled = true;
}

function answer(idx) {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[current];
  const correct = idx === q.correct;
  if (correct) score++;

  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('selected-correct');
    else if (i === idx && !correct) btn.classList.add('selected-wrong');
  });

  const fb = document.getElementById('feedback');
  fb.className = `feedback ${correct ? 'correct' : 'wrong'} show`;
  fb.textContent = correct ? `✓ ${q.feedback.correct}` : `✗ ${q.feedback.wrong}`;

  answers.push({ q: q.q, chosen: q.options[idx], correct });
  document.getElementById('score-display').textContent = `Score: ${score} / ${current + 1}`;
  document.getElementById('btn-next').disabled = false;
}

function next() {
  current++;
  if (current >= QUESTIONS.length) {
    finish(); return;
  }
  showQuestion();
}

function finish() {
  document.getElementById('prog-fill').style.width = '100%';
  const pct = Math.round(score / QUESTIONS.length * 100);
  const msg = pct === 100 ? 'Perfect score — brilliant work!' :
              pct >= 70  ? 'Great effort — you\'re getting it!' :
              pct >= 50  ? 'Good try — keep practising.' :
                           'Have another go after the lesson!';
  document.getElementById('complete-score').textContent = `${score} / ${QUESTIONS.length}`;
  document.getElementById('complete-sub').textContent = msg;

  // Pre-fill name from header if entered
  const headerName = document.getElementById('pupil-name').value.trim();
  if (headerName) document.getElementById('submit-name').value = headerName;

  document.getElementById('complete-overlay').classList.add('show');
  document.getElementById('submit-name').focus();
}

async function submitResults() {
  const name = document.getElementById('submit-name').value.trim()
              || document.getElementById('pupil-name').value.trim();
  if (!name) { document.getElementById('submit-name').focus(); document.getElementById('submit-feedback').textContent = 'Please add your name first.'; return; }

  const btn = document.getElementById('submit-btn');
  const fb  = document.getElementById('submit-feedback');
  btn.disabled = true; btn.textContent = 'Sharing…';

  const payload = {
    name,
    score: `${score} / ${QUESTIONS.length}`,
    percent: Math.round(score / QUESTIONS.length * 100) + '%',
    answers: answers.map((a,i) => `Q${i+1}: ${a.correct ? '✓' : '✗'} "${a.chosen}"`).join(' | '),
    timestamp: new Date().toISOString(),
  };

  try {
    await fetch(SHEET_URL, { method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    btn.textContent = '✓ Shared!';
    fb.textContent  = 'Your results have been sent to your teacher.';
  } catch {
    btn.disabled = false; btn.textContent = 'Share with teacher ◆';
    fb.textContent = 'Could not share — check your connection.';
  }
}

function showToast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = err ? 'error' : '';
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
}

showQuestion();
</script>
</body>
</html>
