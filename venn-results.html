<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venn Results · Lesson 4</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:    #c9a84c; --gold-lt: #e9c46a;
    --stone-dk:#140a04; --cream:   #f5edd6; --sand:#e8d5b0;
    --jade-lt: #40916c;
    --maya-lt: #e09050; --saxon-lt:#7aaed6; --islam-lt:#b07ed4;
    --ms-c:    #e07ab0; --mi-c:    #e0a040; --si-c:    #90a8e0; --all-c:   #c4c450;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Crimson Pro',Georgia,serif; background:var(--stone-dk); color:var(--cream); min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; pointer-events:none;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px),
    repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px); }
  header { position:relative; z-index:1; background:linear-gradient(180deg,#0d0604 0%,rgba(13,6,4,.8) 100%);
    border-bottom:2px solid var(--gold); padding:14px 24px;
    display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .eyebrow { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.22em; color:var(--gold); text-transform:uppercase; margin-bottom:3px; }
  h1 { font-family:'Cinzel',serif; font-size:clamp(1rem,2.5vw,1.5rem); font-weight:700; color:var(--gold-lt); }
  .live-dot { width:8px; height:8px; border-radius:50%; background:var(--jade-lt); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  main { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:24px 20px 60px; display:flex; flex-direction:column; gap:28px; }

  .stat-row { display:flex; gap:12px; flex-wrap:wrap; }
  .stat-card { background:rgba(0,0,0,.3); border:1px solid rgba(201,168,76,.3); border-radius:10px; padding:14px 20px; flex:1 1 120px; text-align:center; }
  .stat-n { font-family:'Cinzel',serif; font-size:2rem; font-weight:700; color:var(--gold-lt); line-height:1; }
  .stat-l { font-size:.75rem; font-style:italic; color:var(--sand); margin-top:4px; }

  .section-title { font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.18em; color:var(--gold); text-transform:uppercase; padding-bottom:7px; border-bottom:1px solid rgba(201,168,76,.3); margin-bottom:20px; }

  /* ── SVG VENN ── */
  .venn-container {
    background:rgba(0,0,0,.25); border:1px solid rgba(201,168,76,.2);
    border-radius:14px; padding:16px; position:relative;
  }
  /* Aspect-ratio wrapper so overlay % positions match the SVG */
  .venn-svg-wrap {
    position:relative;
    width:100%;
    padding-bottom:70%; /* 420/600 = 70% — matches viewBox */
  }
  .venn-svg-wrap svg {
    position:absolute; inset:0; width:100%; height:100%;
  }

  /* Zone overlays — absolutely positioned on top of the SVG */
  .zone-overlay {
    position:absolute;
    display:flex; flex-direction:column; gap:3px;
    align-items:center;
    pointer-events:auto; /* enable tapping */
    overflow:visible;
  }

  /* Tiny chips inside circles */
  .zone-chip {
    font-family:'Crimson Pro',Georgia,serif;
    font-size:clamp(.5rem,.9vw,.68rem);
    line-height:1.25; padding:3px 7px; border-radius:4px;
    text-align:center; word-break:break-word;
    animation:chipIn .25s ease;
    max-width:100%;
    cursor:pointer;
    transition:transform .15s, box-shadow .15s, opacity .15s;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }
  .zone-chip:hover { transform:scale(1.06); box-shadow:0 2px 10px rgba(0,0,0,.5); }
  .zone-chip:active { transform:scale(.97); }
  @keyframes chipIn { from{opacity:0;transform:scale(.88)} to{opacity:1;transform:scale(1)} }

  .zone-chip.maya-only  { background:rgba(184,115,58,.45); color:#f0b070; border:1px solid rgba(224,144,80,.4); }
  .zone-chip.saxon-only { background:rgba(74,127,168,.45);  color:#a0d0f0; border:1px solid rgba(122,174,214,.4); }
  .zone-chip.islam-only { background:rgba(122,79,168,.45);  color:#d0a0f0; border:1px solid rgba(176,126,212,.4); }
  .zone-chip.ms         { background:rgba(180,70,130,.45);  color:#f090c0; border:1px solid rgba(196,90,144,.4); }
  .zone-chip.mi         { background:rgba(180,110,20,.45);  color:#f0c060; border:1px solid rgba(196,140,40,.4); }
  .zone-chip.si         { background:rgba(70,100,160,.45);  color:#90b8f0; border:1px solid rgba(90,120,190,.4); }
  .zone-chip.all        { background:rgba(120,120,30,.5);   color:#d8d860; border:1px solid rgba(180,180,60,.5); }
  .zone-chip.more       { opacity:.6; font-style:italic; font-size:clamp(.45rem,.8vw,.6rem); cursor:default; }
  .zone-chip.more:hover { transform:none; box-shadow:none; }

  /* ── CHIP DETAIL MODAL ── */
  .chip-overlay {
    position:fixed; inset:0; background:rgba(6,3,1,.8);
    z-index:300; display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .2s;
    backdrop-filter:blur(5px); padding:20px;
  }
  .chip-overlay.open { opacity:1; pointer-events:auto; }

  .chip-modal {
    border-radius:12px; max-width:460px; width:100%; position:relative;
    box-shadow:0 24px 64px rgba(0,0,0,.85);
    transform:translateY(16px) scale(.97);
    transition:transform .24s cubic-bezier(.34,1.4,.64,1);
    overflow:hidden;
  }
  .chip-overlay.open .chip-modal { transform:translateY(0) scale(1); }

  .chip-modal.maya-only  { background:linear-gradient(145deg,#2a1508,#180c04); border:1px solid rgba(224,144,80,.55); }
  .chip-modal.saxon-only { background:linear-gradient(145deg,#0e1e2e,#08121c); border:1px solid rgba(122,174,214,.55); }
  .chip-modal.islam-only { background:linear-gradient(145deg,#1a0e28,#0f0818); border:1px solid rgba(176,126,212,.55); }
  .chip-modal.ms         { background:linear-gradient(145deg,#28101e,#180810); border:1px solid rgba(196,90,144,.55); }
  .chip-modal.mi         { background:linear-gradient(145deg,#281808,#181005); border:1px solid rgba(196,140,40,.55); }
  .chip-modal.si         { background:linear-gradient(145deg,#101828,#081018); border:1px solid rgba(90,120,190,.55); }
  .chip-modal.all        { background:linear-gradient(145deg,#1e1e08,#101008); border:1px solid rgba(180,180,60,.55); }

  .cm-close {
    position:absolute; top:10px; right:12px;
    background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.15);
    color:rgba(232,213,176,.6); border-radius:4px; padding:5px 12px;
    cursor:pointer; font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.1em;
    touch-action:manipulation; transition:all .18s; z-index:10;
  }
  .cm-close:active { border-color:var(--gold); color:var(--gold-lt); }

  .cm-body { padding:22px 22px 22px; }

  .cm-zone-label {
    font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.16em;
    text-transform:uppercase; margin-bottom:8px;
  }
  .chip-modal.maya-only  .cm-zone-label { color:#f0b070; }
  .chip-modal.saxon-only .cm-zone-label { color:#a0d0f0; }
  .chip-modal.islam-only .cm-zone-label { color:#d0a0f0; }
  .chip-modal.ms         .cm-zone-label { color:#f090c0; }
  .chip-modal.mi         .cm-zone-label { color:#f0c060; }
  .chip-modal.si         .cm-zone-label { color:#90b8f0; }
  .chip-modal.all        .cm-zone-label { color:#d8d860; }

  .cm-statement {
    font-family:'Crimson Pro',Georgia,serif; font-size:1.15rem;
    line-height:1.55; color:var(--cream); margin-bottom:16px;
  }

  .cm-divider { border:none; border-top:1px solid rgba(255,255,255,.08); margin-bottom:14px; }

  .cm-overlap-label {
    font-family:'Cinzel',serif; font-size:.58rem; letter-spacing:.14em;
    color:rgba(232,213,176,.45); text-transform:uppercase; margin-bottom:10px;
  }

  .cm-civs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
  .cm-civ {
    display:flex; align-items:center; gap:5px;
    padding:7px 14px; border-radius:7px; font-size:.82rem;
    font-family:'Cinzel',serif; letter-spacing:.04em;
  }
  .cm-civ.maya  { background:rgba(184,115,58,.3); border:1px solid rgba(224,144,80,.4); color:#f0b070; }
  .cm-civ.saxon { background:rgba(74,127,168,.3);  border:1px solid rgba(122,174,214,.4); color:#a0d0f0; }
  .cm-civ.islam { background:rgba(122,79,168,.3);  border:1px solid rgba(176,126,212,.4); color:#d0a0f0; }

  .cm-count {
    font-size:.78rem; font-style:italic; color:rgba(232,213,176,.5);
  }

  /* ── CORRECT / INCORRECT INDICATORS ── */
  .cm-verdict {
    display:flex; align-items:flex-start; gap:10px;
    padding:11px 14px; border-radius:8px; margin-bottom:12px;
    font-size:.88rem; line-height:1.45;
  }
  .cm-verdict.correct {
    background:rgba(45,106,79,.25); border:1px solid rgba(64,145,108,.45);
    color:#74c99a;
  }
  .cm-verdict.incorrect {
    background:rgba(193,68,14,.22); border:1px solid rgba(193,68,14,.45);
    color:#f09070;
  }
  .cm-verdict.ambiguous {
    background:rgba(201,168,76,.15); border:1px solid rgba(201,168,76,.4);
    color:var(--gold-lt);
  }
  .cm-verdict-icon { font-size:1.15rem; flex-shrink:0; line-height:1.3; }
  .cm-verdict-text { flex:1; }
  .cm-correct-zone {
    display:flex; align-items:center; gap:7px; margin-top:8px; flex-wrap:wrap;
  }
  .cm-correct-zone-label {
    font-family:'Cinzel',serif; font-size:.55rem; letter-spacing:.1em;
    color:rgba(232,213,176,.45); text-transform:uppercase;
  }
  .cm-correct-zone-pill {
    font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.06em;
    padding:3px 10px; border-radius:20px;
    background:rgba(201,168,76,.18); border:1px solid rgba(201,168,76,.4);
    color:var(--gold-lt);
  }

  /* ── SUBMISSIONS ── */
  .submissions-grid { display:flex; flex-direction:column; gap:12px; }
  .submission-card { background:rgba(0,0,0,.3); border:1px solid rgba(201,168,76,.18); border-radius:10px; overflow:hidden; }
  .sub-header { padding:8px 14px; background:rgba(201,168,76,.08); border-bottom:1px solid rgba(201,168,76,.12);
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px; }
  .sub-names { font-family:'Cinzel',serif; font-size:.68rem; color:var(--gold-lt); }
  .sub-time  { font-size:.65rem; font-style:italic; color:rgba(232,213,176,.4); }
  .sub-body  { display:grid; grid-template-columns:repeat(7,1fr); }
  .sub-col   { padding:7px 9px; font-size:.72rem; border-left:1px solid rgba(255,255,255,.06); }
  .sub-col:first-child { border-left:none; }
  .sub-col-label { font-family:'Cinzel',serif; font-size:.5rem; letter-spacing:.08em; text-transform:uppercase; margin-bottom:4px; }
  .sub-col.maya  .sub-col-label { color:var(--maya-lt); }
  .sub-col.saxon .sub-col-label { color:var(--saxon-lt); }
  .sub-col.islam .sub-col-label { color:var(--islam-lt); }
  .sub-col.ms    .sub-col-label { color:var(--ms-c); }
  .sub-col.mi    .sub-col-label { color:var(--mi-c); }
  .sub-col.si    .sub-col-label { color:var(--si-c); }
  .sub-col.all   .sub-col-label { color:var(--all-c); }
  .sub-col-item { color:var(--sand); line-height:1.3; padding:2px 0; }
  .sub-col-empty { color:rgba(232,213,176,.25); font-style:italic; font-size:.65rem; }

  .status { text-align:center; padding:50px 20px; font-size:1rem; font-style:italic; color:var(--sand); }
  .actions { display:flex; gap:12px; justify-content:center; }
  button { font-family:'Cinzel',serif; font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; padding:12px 28px; border:none; border-radius:5px; cursor:pointer; transition:all .2s; }
  .btn-secondary { background:transparent; color:var(--sand); border:1px solid rgba(201,168,76,.35); }
  .btn-secondary:hover { border-color:var(--gold); color:var(--gold-lt); }

  @media(max-width:700px) {
    .sub-body { grid-template-columns:1fr 1fr; }
  }
  @media(max-width:480px) {
    .sub-body { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<header>
  <div>
    <div class="eyebrow">Teacher View · Lesson 7 · Maya Enquiry</div>
    <h1>Three-Way Venn — Class Results</h1>
  </div>
  <div class="live-dot"></div>
</header>

<main id="main">
  <div class="status" id="status">Loading…</div>
</main>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQNqr1dLDto9DsqIrTYAmK4aay6J6d9AHv0QHmJazO-I42Mx1uDhzKtb0YFvivALTnnfp74fE3hnJVc/pub?gid=0&single=true&output=csv';

function splitCSV(line) {
  const r=[]; let c='',q=false;
  for(const ch of line){ if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c.trim());c='';}else{c+=ch;} }
  r.push(c.trim()); return r;
}
function normalise(s) { return s.toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim(); }

// ── LOOKUP TABLES — top-level so openChipModal can access them ─────────
const ZONE_LABELS = {
  'maya-only':  '🏺 Maya Only',
  'saxon-only': '⚔️ Anglo-Saxon Only',
  'islam-only': '🌙 Islam Only',
  'ms':         '🏺 Maya + ⚔️ Anglo-Saxon',
  'mi':         '🏺 Maya + 🌙 Islam',
  'si':         '⚔️ Anglo-Saxon + 🌙 Islam',
  'all':        '★ All Three Civilisations',
};
const ZONE_CIVS = {
  'maya-only':  ['maya'],
  'saxon-only': ['saxon'],
  'islam-only': ['islam'],
  'ms':         ['maya','saxon'],
  'mi':         ['maya','islam'],
  'si':         ['saxon','islam'],
  'all':        ['maya','saxon','islam'],
};
const CIV_LABELS = { maya:'🏺 Maya', saxon:'⚔️ Anglo-Saxon', islam:'🌙 Islam' };
function tally(rows, field) {
  const c={};
  rows.forEach(r => {
    (r[field]||'').split('|').map(s=>s.trim()).filter(Boolean).forEach(item => {
      const k=normalise(item);
      if(!c[k]) c[k]={display:item,count:0};
      c[k].count++;
    });
  });
  return Object.values(c).sort((a,b)=>b.count-a.count);
}

async function load() {
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now());
    const txt = await res.text();
    const lines = txt.trim().split('\n').filter(l=>l.trim());
    if (lines.length < 2) { render([]); return; }
    const rows = lines.slice(1).map(l => {
      const c = splitCSV(l);
      // Columns: Timestamp, Names, MayaOnly, SaxonOnly, IslamOnly, MayaSaxon, MayaIslam, SaxonIslam, AllThree
      return { timestamp:c[0]||'', names:c[1]||'', mayaOnly:c[2]||'', saxonOnly:c[3]||'', islamOnly:c[4]||'', mayaSaxon:c[5]||'', mayaIslam:c[6]||'', saxonIslam:c[7]||'', allThree:c[8]||'' };
    }).filter(r=>r.names);
    render(rows);
    document.getElementById('status')?.remove();
  } catch(e) {
    const s=document.getElementById('status');
    if(s) s.textContent='Could not load — check the sheet is published as CSV.';
  }
}

function render(rows) {
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (!rows.length) { main.innerHTML='<div class="status">No submissions yet.</div>'; return; }

  const T = {
    maya:  tally(rows,'mayaOnly'),
    saxon: tally(rows,'saxonOnly'),
    islam: tally(rows,'islamOnly'),
    ms:    tally(rows,'mayaSaxon'),
    mi:    tally(rows,'mayaIslam'),
    si:    tally(rows,'saxonIslam'),
    all:   tally(rows,'allThree'),
  };

  // STATS
  const stats = document.createElement('div');
  stats.className = 'stat-row';
  const totalUnique = Object.values(T).reduce((a,t)=>a+t.length,0);
  stats.innerHTML = `
    <div class="stat-card"><div class="stat-n">${rows.length}</div><div class="stat-l">groups submitted</div></div>
    <div class="stat-card"><div class="stat-n">${T.all.length}</div><div class="stat-l">shared by all three</div></div>
    <div class="stat-card"><div class="stat-n">${totalUnique}</div><div class="stat-l">unique ideas total</div></div>`;
  main.appendChild(stats);

  // VENN SECTION
  const vennSection = document.createElement('div');
  vennSection.innerHTML = '<p class="section-title">◆ Class Consensus — Three-Way Venn Diagram</p>';

  const container = document.createElement('div');
  container.className = 'venn-container';

  // Helper — build overlay chips for a zone
  function overlayHTML(list, zone, max) {
    if (!list.length) return '';
    const chips = list.slice(0, max).map(({display, count}) => {
      const label = display.length > 36 ? display.slice(0,34)+'…' : display;
      const badge = count > 1 ? ` <em style="opacity:.65;font-size:.85em">(${count})</em>` : '';
      // Store full text + count in data attrs for the modal
      const safeText = display.replace(/"/g,'&quot;');
      return `<div class="zone-chip ${zone}" data-full="${safeText}" data-count="${count}" data-zone="${zone}" onclick="openChipModal(this)">${label}${badge}</div>`;
    }).join('');
    const extra = list.length > max
      ? `<div class="zone-chip ${zone} more">+${list.length - max} more</div>` : '';
    return chips + extra;
  }

  // Zone overlay positions as % of the 600×420 viewBox wrapper
  const ZONES_POS = {
    'maya-only':  { l:'4%',  t:'18%', w:'20%', max:4 },
    'saxon-only': { l:'76%', t:'18%', w:'20%', max:4 },
    'islam-only': { l:'37%', t:'74%', w:'26%', max:3 },
    'ms':         { l:'39%', t:'10%', w:'22%', max:3 },
    'mi':         { l:'22%', t:'56%', w:'17%', max:3 },
    'si':         { l:'61%', t:'56%', w:'17%', max:3 },
    'all':        { l:'37%', t:'42%', w:'26%', max:4 },
  };
  const zoneData = { 'maya-only':T.maya, 'saxon-only':T.saxon, 'islam-only':T.islam, ms:T.ms, mi:T.mi, si:T.si, all:T.all };

  const overlays = Object.entries(ZONES_POS).map(([zone, pos]) =>
    `<div class="zone-overlay" style="left:${pos.l};top:${pos.t};width:${pos.w}">${overlayHTML(zoneData[zone], zone, pos.max)}</div>`
  ).join('');

  container.innerHTML = `
    <div class="venn-svg-wrap">
      <svg viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="cp-maya"><circle cx="220" cy="160" r="155"/></clipPath>
          <clipPath id="cp-saxon"><circle cx="380" cy="160" r="155"/></clipPath>
          <clipPath id="cp-islam"><circle cx="300" cy="295" r="155"/></clipPath>
        </defs>
        <circle cx="220" cy="160" r="155" fill="rgba(184,115,58,.13)" stroke="rgba(224,144,80,.55)" stroke-width="1.5"/>
        <circle cx="380" cy="160" r="155" fill="rgba(74,127,168,.13)"  stroke="rgba(122,174,214,.55)" stroke-width="1.5"/>
        <circle cx="300" cy="295" r="155" fill="rgba(122,79,168,.13)"  stroke="rgba(176,126,212,.55)" stroke-width="1.5"/>
        <circle cx="220" cy="160" r="155" fill="rgba(196,90,144,.06)"  clip-path="url(#cp-saxon)"/>
        <circle cx="220" cy="160" r="155" fill="rgba(196,120,32,.06)"  clip-path="url(#cp-islam)"/>
        <circle cx="380" cy="160" r="155" fill="rgba(90,110,168,.06)"  clip-path="url(#cp-islam)"/>
        <text x="118" y="88"  font-family="Cinzel,serif" font-size="12" font-weight="700" fill="rgba(224,144,80,.9)"  text-anchor="middle">🏺 Maya</text>
        <text x="482" y="88"  font-family="Cinzel,serif" font-size="12" font-weight="700" fill="rgba(122,174,214,.9)" text-anchor="middle">⚔️ Saxon</text>
        <text x="300" y="414" font-family="Cinzel,serif" font-size="12" font-weight="700" fill="rgba(176,126,212,.9)" text-anchor="middle">🌙 Islam</text>
      </svg>
      ${overlays}
    </div>`;

  vennSection.appendChild(container);
  main.appendChild(vennSection);

  // SUBMISSIONS TABLE
  const section = document.createElement('div');
  section.innerHTML = '<p class="section-title">◆ All Group Submissions</p>';
  const grid = document.createElement('div');
  grid.className = 'submissions-grid';

  const parse = str => str ? str.split('|').map(s=>s.trim()).filter(Boolean) : [];
  const colItems = (items, cls) => items.length
    ? items.map(i=>`<div class="sub-col-item">${i}</div>`).join('')
    : '<div class="sub-col-empty">—</div>';

  [...rows].reverse().forEach(r => {
    const card = document.createElement('div');
    card.className = 'submission-card';
    const time = r.timestamp ? new Date(r.timestamp).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : '—';
    card.innerHTML = `
      <div class="sub-header"><span class="sub-names">${r.names}</span><span class="sub-time">${time}</span></div>
      <div class="sub-body">
        <div class="sub-col maya"><div class="sub-col-label">🏺 Maya</div>${colItems(parse(r.mayaOnly))}</div>
        <div class="sub-col saxon"><div class="sub-col-label">⚔️ Saxon</div>${colItems(parse(r.saxonOnly))}</div>
        <div class="sub-col islam"><div class="sub-col-label">🌙 Islam</div>${colItems(parse(r.islamOnly))}</div>
        <div class="sub-col ms"><div class="sub-col-label">M+S</div>${colItems(parse(r.mayaSaxon))}</div>
        <div class="sub-col mi"><div class="sub-col-label">M+I</div>${colItems(parse(r.mayaIslam))}</div>
        <div class="sub-col si"><div class="sub-col-label">S+I</div>${colItems(parse(r.saxonIslam))}</div>
        <div class="sub-col all"><div class="sub-col-label">★ All</div>${colItems(parse(r.allThree))}</div>
      </div>`;
    grid.appendChild(card);
  });
  section.appendChild(grid);
  main.appendChild(section);

  const actions = document.createElement('div');
  actions.className = 'actions';
  actions.innerHTML = `<button class="btn-secondary" onclick="load()">↺ Refresh</button>`;
  main.appendChild(actions);
}

load();
setInterval(load, 30000);

// ── CHIP MODAL ─────────────────────────────────────────────────────────
function openChipModal(el) {
  const zone  = el.dataset.zone;
  const full  = el.dataset.full;
  const count = parseInt(el.dataset.count) || 1;

  const modal   = document.getElementById('chip-modal');
  const overlay = document.getElementById('chip-overlay');

  modal.className = `chip-modal ${zone}`;
  document.getElementById('cm-zone-label').textContent = ZONE_LABELS[zone] || zone;
  document.getElementById('cm-statement').textContent  = full;

  // Civilisation pills
  const civs = ZONE_CIVS[zone] || [];
  document.getElementById('cm-civs').innerHTML = civs.map(c =>
    `<div class="cm-civ ${c}">${CIV_LABELS[c]}</div>`
  ).join('');

  // Count line
  const countEl = document.getElementById('cm-count');
  countEl.textContent = count > 1 ? `${count} groups placed this here` : '';
  countEl.style.display = count > 1 ? 'block' : 'none';

  // ── VERDICT ──────────────────────────────────────────────────────────
  const verdictEl = document.getElementById('cm-verdict');
  const key = normalise(full);
  const answer = ANSWER_KEY[key];

  if (!answer) {
    // Statement not in key — might be a class-generated one
    verdictEl.className = 'cm-verdict ambiguous';
    verdictEl.innerHTML = `<span class="cm-verdict-icon">💬</span>
      <span class="cm-verdict-text">This statement was written by the class — discuss whether you agree with where it's been placed.</span>`;
  } else if (answer.zone === zone) {
    verdictEl.className = 'cm-verdict correct';
    verdictEl.innerHTML = `<span class="cm-verdict-icon">✓</span>
      <span class="cm-verdict-text"><strong>Correct zone!</strong> ${answer.explanation}</span>`;
  } else {
    verdictEl.className = 'cm-verdict incorrect';
    verdictEl.innerHTML = `<span class="cm-verdict-icon">✗</span>
      <span class="cm-verdict-text"><strong>Not quite right.</strong> ${answer.explanation}
        <div class="cm-correct-zone">
          <span class="cm-correct-zone-label">Should be in:</span>
          <span class="cm-correct-zone-pill">${ZONE_LABELS[answer.zone]}</span>
        </div>
      </span>`;
  }

  overlay.classList.add('open');
}

function closeChipModal() {
  document.getElementById('chip-overlay').classList.remove('open');
}

document.getElementById('chip-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('chip-overlay')) closeChipModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeChipModal();
});
