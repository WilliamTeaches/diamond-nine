<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curiosity Results · Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --gold:    #c9a84c; --gold-lt: #e9c46a;
    --stone:   #3d2b1f; --stone-dk:#1e0f07;
    --cream:   #f5edd6; --sand:    #e8d5b0;
    --jade:    #2d6a4f; --jade-lt: #40916c;
    --saxon:   #7aaed6; --islam:   #b07ed4;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--stone-dk); color: var(--cream);
    min-height: 100vh;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px);
  }
  header {
    position: relative; z-index: 1;
    background: linear-gradient(180deg, #0d0604 0%, rgba(13,6,4,.8) 100%);
    border-bottom: 2px solid var(--gold);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .eyebrow { font-family: 'Cinzel', serif; font-size: .62rem; letter-spacing: .22em; color: var(--gold); text-transform: uppercase; margin-bottom: 3px; }
  h1 { font-family: 'Cinzel', serif; font-size: clamp(1rem,2.5vw,1.6rem); font-weight: 700; color: var(--gold-lt); }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--jade-lt); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

  main { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 28px 20px 60px; display: flex; flex-direction: column; gap: 28px; }

  .stat-row { display: flex; gap: 14px; flex-wrap: wrap; }
  .stat-card { background: rgba(0,0,0,.3); border: 1px solid rgba(201,168,76,.3); border-radius: 10px; padding: 16px 24px; flex: 1 1 140px; text-align: center; }
  .stat-n { font-family: 'Cinzel', serif; font-size: 2.4rem; font-weight: 700; color: var(--gold-lt); line-height: 1; }
  .stat-l { font-size: .8rem; font-style: italic; color: var(--sand); margin-top: 5px; }

  .section-title { font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: .18em; color: var(--gold); text-transform: uppercase; padding-bottom: 8px; border-bottom: 1px solid rgba(201,168,76,.3); margin-bottom: 18px; }

  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width:640px){ .charts-row { grid-template-columns: 1fr; } }
  .chart-box { background: rgba(0,0,0,.3); border: 1px solid rgba(201,168,76,.2); border-radius: 10px; padding: 18px; }
  .chart-box.saxon-box { border-color: rgba(122,174,214,.35); }
  .chart-box.islam-box { border-color: rgba(176,126,212,.35); }
  .chart-box h3 { font-family: 'Cinzel', serif; font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 14px; text-align: center; }
  .chart-box.saxon-box h3 { color: var(--saxon); }
  .chart-box.islam-box h3 { color: var(--islam); }
  canvas { max-height: 280px; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  thead tr { background: rgba(201,168,76,.12); }
  th { font-family: 'Cinzel', serif; font-size: .6rem; letter-spacing: .12em; color: var(--gold); text-transform: uppercase; padding: 10px 12px; text-align: left; }
  td { padding: 9px 12px; border-bottom: 1px solid rgba(255,255,255,.06); color: var(--sand); }
  tr:hover td { background: rgba(255,255,255,.03); }

  .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button { font-family: 'Cinzel', serif; font-size: .68rem; letter-spacing: .1em; text-transform: uppercase; padding: 12px 28px; border: none; border-radius: 5px; cursor: pointer; transition: all .2s; }
  .btn-primary { background: linear-gradient(135deg, var(--gold) 0%, #a8832a 100%); color: var(--stone); }
  .btn-primary:hover { transform: translateY(-1px); }
  .btn-secondary { background: transparent; color: var(--sand); border: 1px solid rgba(201,168,76,.35); }
  .btn-secondary:hover { border-color: var(--gold); color: var(--gold-lt); }

  .status { text-align: center; padding: 50px 20px; font-size: 1rem; font-style: italic; color: var(--sand); }
  .progress-bar { height: 3px; background: rgba(201,168,76,.15); border-radius: 2px; overflow: hidden; max-width: 400px; margin: 10px auto 0; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--jade-lt), var(--gold)); border-radius: 2px; transition: width .4s; }
</style>
</head>
<body>
<header>
  <div>
    <div class="eyebrow">Teacher View · Maya Enquiry · Year 4</div>
    <h1>Learner Curiosity — What Do They Want to Explore?</h1>
  </div>
  <div class="live-dot" title="Updates every 30 seconds"></div>
</header>

<main id="main">
  <div class="status" id="status">Loading responses…</div>
</main>

<script>
// ── Replace with your Google Apps Script curiosity sheet URL ──────────
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQf1XDI7qHdY7anNxChesR1fLE5Wod5PAZhyaZh1qvaUB65ZuBzxZVKiB8vIP7psFDQ4f2vGR0Ngsn8/pub?gid=0&single=true&output=csv';
// ─────────────────────────────────────────────────────────────────────

let saxonChart = null, islamChart = null;

function splitCSV(line) {
  const r = []; let c = '', q = false;
  for (const ch of line) {
    if (ch==='"') { q=!q; } else if (ch===',' && !q) { r.push(c.trim()); c=''; } else { c+=ch; }
  }
  r.push(c.trim()); return r;
}

async function load() {
  try {
    const res  = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await res.text();
    const lines = text.trim().split('\n').filter(l => l.trim());
    if (lines.length < 2) { render([]); return; }
    // Columns: Timestamp, Topic, Period, Date
    const rows = lines.slice(1).map(l => {
      const c = splitCSV(l);
      return { timestamp: c[0]||'', topic: c[1]||'', period: c[2]||'', date: c[3]||'' };
    }).filter(r => r.topic);
    render(rows);
    document.getElementById('status')?.remove();
  } catch(e) {
    document.getElementById('status').textContent = 'Could not load — check the sheet is published as CSV.';
  }
}

function countBy(rows, field) {
  const c = {};
  rows.forEach(r => { c[r[field]] = (c[r[field]]||0)+1; });
  return Object.entries(c).sort((a,b) => b[1]-a[1]);
}

function render(rows) {
  const main = document.getElementById('main');
  main.innerHTML = '';
  if (!rows.length) {
    main.innerHTML = '<div class="status">No curiosity votes yet — share the timeline with your class!</div>';
    return;
  }

  const saxonRows = rows.filter(r => r.period.includes('Saxon') || r.period.includes('Viking'));
  const islamRows = rows.filter(r => r.period.includes('Islam'));
  const topSaxon  = countBy(saxonRows, 'topic');
  const topIslam  = countBy(islamRows, 'topic');
  const topOverall = countBy(rows, 'topic')[0];

  // Stats
  const stats = document.createElement('div');
  stats.className = 'stat-row';
  stats.innerHTML = `
    <div class="stat-card"><div class="stat-n">${rows.length}</div><div class="stat-l">total votes</div></div>
    <div class="stat-card"><div class="stat-n">${saxonRows.length}</div><div class="stat-l">Saxon &amp; Viking votes</div></div>
    <div class="stat-card"><div class="stat-n">${islamRows.length}</div><div class="stat-l">Golden Age of Islam votes</div></div>
    ${topOverall ? `<div class="stat-card" style="border-color:rgba(201,168,76,.5)"><div class="stat-n" style="font-size:1.1rem;padding-top:6px">${topOverall[0]}</div><div class="stat-l">most requested topic (${topOverall[1]} votes)</div></div>` : ''}
  `;
  main.appendChild(stats);

  // Charts
  const chartsSection = document.createElement('div');
  chartsSection.innerHTML = '<p class="section-title">◆ Votes by Topic</p>';
  const chartsRow = document.createElement('div');
  chartsRow.className = 'charts-row';

  const saxonBox = document.createElement('div');
  saxonBox.className = 'chart-box saxon-box';
  saxonBox.innerHTML = '<h3>⚔ Anglo-Saxon &amp; Viking Britain</h3><canvas id="saxon-chart"></canvas>';

  const islamBox = document.createElement('div');
  islamBox.className = 'chart-box islam-box';
  islamBox.innerHTML = '<h3>🌙 Golden Age of Islam</h3><canvas id="islam-chart"></canvas>';

  chartsRow.appendChild(saxonBox);
  chartsRow.appendChild(islamBox);
  chartsSection.appendChild(chartsRow);
  main.appendChild(chartsSection);

  const opts = (color, color2) => ({
    indexAxis: 'y', responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks:{ color:'#e8d5b0', stepSize:1 }, grid:{ color:'rgba(255,255,255,.07)' }, border:{ color:'rgba(255,255,255,.1)' } },
      y: { ticks:{ color:'#e8d5b0', font:{ size:10 } }, grid:{ display:false }, border:{ display:false } },
    },
  });

  if (saxonChart) saxonChart.destroy();
  saxonChart = new Chart(document.getElementById('saxon-chart'), {
    type: 'bar',
    data: {
      labels: topSaxon.map(([k])=>k),
      datasets: [{ data: topSaxon.map(([,v])=>v), backgroundColor: topSaxon.map((_,i)=> i===0?'#7aaed6':'rgba(122,174,214,.3)'), borderRadius:4 }]
    },
    options: opts(),
  });

  if (islamChart) islamChart.destroy();
  islamChart = new Chart(document.getElementById('islam-chart'), {
    type: 'bar',
    data: {
      labels: topIslam.map(([k])=>k),
      datasets: [{ data: topIslam.map(([,v])=>v), backgroundColor: topIslam.map((_,i)=> i===0?'#b07ed4':'rgba(176,126,212,.3)'), borderRadius:4 }]
    },
    options: opts(),
  });

  // Table
  const tableSection = document.createElement('div');
  tableSection.innerHTML = '<p class="section-title">◆ All Votes</p>';
  const tw = document.createElement('div');
  tw.className = 'table-wrap';
  tw.innerHTML = `<table>
    <thead><tr><th>Time</th><th>Period</th><th>Topic</th></tr></thead>
    <tbody>${rows.map(r => `<tr>
      <td>${r.timestamp ? new Date(r.timestamp).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : '—'}</td>
      <td>${r.period}</td>
      <td>${r.topic}</td>
    </tr>`).join('')}</tbody>
  </table>`;
  tableSection.appendChild(tw);
  main.appendChild(tableSection);

  // Actions
  const actions = document.createElement('div');
  actions.className = 'actions';
  actions.innerHTML = `<button class="btn-secondary" onclick="load()">↺ Refresh</button>`;
  main.appendChild(actions);
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
