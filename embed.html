<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diamond Nine · Live Results</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --gold:   #c9a84c;
    --gold-lt:#e9c46a;
    --stone:  #3d2b1f;
    --cream:  #f5edd6;
    --sand:   #e8d5b0;
    --terra:  #c1440e;
    --jade:   #40916c;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--stone);
    color: var(--cream);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px),
      repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px);
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  .page {
    position: relative;
    width: 100%; height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 0;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(180deg, #1e0f07 0%, rgba(30,15,7,.5) 100%);
    border-bottom: 2px solid var(--gold);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .header-title {
    font-family: 'Cinzel', serif;
    font-size: .8rem;
    font-weight: 700;
    color: var(--gold-lt);
    letter-spacing: .06em;
  }
  .header-sub {
    font-size: .7rem;
    font-style: italic;
    color: var(--sand);
    opacity: .7;
  }
  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--jade);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:.4; transform:scale(.7); }
  }

  /* ── SLIDES CONTAINER ── */
  .slides {
    position: relative;
    overflow: hidden;
    width: 100%;
    height: 100%;
  }
  .slide {
    position: absolute; inset: 0;
    padding: 10px 14px;
    opacity: 0;
    transition: opacity .6s ease;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .slide.active { opacity: 1; pointer-events: auto; }

  /* ── STAT PILLS ── */
  .stats-row {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .stat {
    background: rgba(0,0,0,.3);
    border: 1px solid rgba(201,168,76,.3);
    border-radius: 6px;
    padding: 5px 10px;
    flex: 1 1 80px;
    text-align: center;
  }
  .stat-n {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold-lt);
    line-height: 1;
  }
  .stat-l {
    font-size: .62rem;
    font-style: italic;
    color: var(--sand);
    margin-top: 2px;
    line-height: 1.3;
  }

  /* ── CHART SLIDE ── */
  .chart-title {
    font-family: 'Cinzel', serif;
    font-size: .68rem;
    letter-spacing: .12em;
    color: var(--gold);
    text-transform: uppercase;
    text-align: center;
  }
  .chart-title.bottom { color: #e07050; }
  .chart-wrap {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  .chart-wrap canvas {
    position: absolute; inset: 0;
    width: 100% !important;
    height: 100% !important;
  }

  /* ── SUMMARY SLIDE ── */
  .summary-winner {
    display: flex; gap: 8px;
  }
  .winner-box {
    flex: 1;
    background: rgba(0,0,0,.35);
    border-radius: 7px;
    padding: 8px 10px;
    border-left: 3px solid var(--gold);
  }
  .winner-box.bottom { border-left-color: var(--terra); }
  .winner-label {
    font-family: 'Cinzel', serif;
    font-size: .55rem; letter-spacing: .1em;
    color: var(--gold); text-transform: uppercase; margin-bottom: 3px;
  }
  .winner-box.bottom .winner-label { color: #e07050; }
  .winner-name {
    font-family: 'Cinzel', serif;
    font-size: .95rem; font-weight: 700;
    color: var(--gold-lt); line-height: 1.2;
  }
  .winner-box.bottom .winner-name { color: var(--cream); }
  .winner-pct {
    font-size: .72rem; font-style: italic;
    color: var(--sand); margin-top: 3px;
  }
  .reasons-label {
    font-family: 'Cinzel', serif;
    font-size: .6rem; letter-spacing: .1em;
    color: var(--gold); text-transform: uppercase;
  }
  .reasons-list {
    flex: 1;
    overflow: hidden;
    display: flex; flex-direction: column; gap: 5px;
  }
  .reason-item {
    background: rgba(0,0,0,.25);
    border-radius: 5px;
    padding: 6px 9px;
    font-size: .75rem;
    font-style: italic;
    color: var(--sand);
    line-height: 1.35;
    border-left: 2px solid rgba(201,168,76,.4);
  }
  .reason-who {
    font-style: normal;
    font-size: .62rem;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    display: block;
    margin-bottom: 2px;
  }

  /* ── FOOTER / NAV ── */
  footer {
    background: rgba(0,0,0,.4);
    border-top: 1px solid rgba(201,168,76,.2);
    padding: 5px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .nav-dots {
    display: flex; gap: 5px; align-items: center;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(201,168,76,.3);
    cursor: pointer;
    transition: background .3s;
  }
  .dot.active { background: var(--gold); }
  .nav-btns { display: flex; gap: 6px; }
  .nav-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,.35);
    color: var(--sand);
    border-radius: 4px;
    padding: 3px 10px;
    font-size: .65rem;
    font-family: 'Cinzel', serif;
    letter-spacing: .06em;
    cursor: pointer;
    transition: all .2s;
  }
  .nav-btn:hover { border-color: var(--gold); color: var(--gold-lt); }
  .refresh-stamp {
    font-size: .6rem;
    font-style: italic;
    color: rgba(232,213,176,.4);
  }

  /* ── LOADING ── */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-style: italic; color: var(--sand); font-size: .85rem;
    background: var(--stone);
    z-index: 10;
  }
</style>
</head>
<body>

<div class="page">
  <header>
    <div>
      <div class="header-title">Diamond Nine · Live Results</div>
      <div class="header-sub">Lesson 5 · Maya Enquiry</div>
    </div>
    <div class="live-dot" title="Live — updates every 30s"></div>
  </header>

  <div class="slides" id="slides">
    <div class="loading" id="loading">Loading responses…</div>

    <!-- Slide 0: Stats + summary -->
    <div class="slide" id="slide-0">
      <div class="stats-row" id="stats-row"></div>
      <div class="summary-winner" id="summary-winner"></div>
      <div class="reasons-label">What groups said about their top choice</div>
      <div class="reasons-list" id="reasons-list"></div>
    </div>

    <!-- Slide 1: Top chart -->
    <div class="slide" id="slide-1">
      <div class="chart-title">◆ Most Significant — Top Card Choices</div>
      <div class="chart-wrap"><canvas id="top-chart"></canvas></div>
    </div>

    <!-- Slide 2: Bottom chart -->
    <div class="slide" id="slide-2">
      <div class="chart-title bottom">◇ Least Significant — Bottom Card Choices</div>
      <div class="chart-wrap"><canvas id="bot-chart"></canvas></div>
    </div>
  </div>

  <footer>
    <div class="nav-dots" id="nav-dots">
      <div class="dot active" onclick="goTo(0)"></div>
      <div class="dot" onclick="goTo(1)"></div>
      <div class="dot" onclick="goTo(2)"></div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="prev()">← Prev</button>
      <button class="nav-btn" onclick="next()">Next →</button>
    </div>
    <div class="refresh-stamp" id="stamp">—</div>
  </footer>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRPRURE9g1iYKrOtQCF3PMwggQDR2qeudR7fzOStsUr_L-ZvNvPRoW2Q0nEFFNsDAFaA7Ow8VuGAVDI/pub?gid=0&single=true&output=csv';

const GOLD   = '#c9a84c';
const GOLD_L = '#e9c46a';
const SAND   = '#e8d5b0';
const CREAM  = '#f5edd6';
const TERRA  = '#c1440e';
const STONE  = '#2a1a0f';

let currentSlide = 0;
const TOTAL = 3;
let topChartInst = null, botChartInst = null;
let autoTimer = null;

function goTo(n) {
  document.getElementById(`slide-${currentSlide}`).classList.remove('active');
  document.querySelectorAll('.dot')[currentSlide].classList.remove('active');
  currentSlide = (n + TOTAL) % TOTAL;
  document.getElementById(`slide-${currentSlide}`).classList.add('active');
  document.querySelectorAll('.dot')[currentSlide].classList.add('active');
}
function next() { goTo(currentSlide + 1); resetAuto(); }
function prev() { goTo(currentSlide - 1); resetAuto(); }
function resetAuto() {
  clearInterval(autoTimer);
  autoTimer = setInterval(() => goTo(currentSlide + 1), 8000);
}

function splitCSVLine(line) {
  const res = []; let cur = '', inQ = false;
  for (const ch of line) {
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { res.push(cur.trim()); cur = ''; }
    else { cur += ch; }
  }
  res.push(cur.trim());
  return res;
}

function countCards(data, field) {
  const c = {};
  data.forEach(r => { if (r[field]) c[r[field]] = (c[r[field]]||0)+1; });
  return Object.entries(c).sort((a,b)=>b[1]-a[1]);
}

async function load() {
  try {
    const res  = await fetch(CSV_URL + '&t=' + Date.now());
    const text = await res.text();
    const lines = text.trim().split('\n').filter(l=>l.trim());
    if (lines.length < 2) return;
    const data = lines.slice(1).map(l => {
      const c = splitCSVLine(l);
      return { name:c[1]||'', topCard:c[2]||'', topReason:c[3]||'', bottomCard:c[4]||'', bottomReason:c[5]||'' };
    }).filter(r=>r.name||r.topCard);

    if (!data.length) return;
    renderAll(data);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('stamp').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('loading').textContent = 'Could not load — check connection';
  }
}

function renderAll(data) {
  const topSorted = countCards(data, 'topCard');
  const botSorted = countCards(data, 'bottomCard');
  const topWinner = topSorted[0];
  const botWinner = botSorted[0];
  const topPct    = Math.round(topWinner[1]/data.length*100);
  const botPct    = Math.round(botWinner[1]/data.length*100);
  const topReasons = data.filter(r=>r.topCard===topWinner[0] && r.topReason).slice(0,3);

  // Stats
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-n">${data.length}</div><div class="stat-l">trios responded</div></div>
    <div class="stat"><div class="stat-n">${topWinner[1]}</div><div class="stat-l">chose <em>${topWinner[0]}</em> as top</div></div>
    <div class="stat"><div class="stat-n">${botWinner[1]}</div><div class="stat-l">chose <em>${botWinner[0]}</em> as bottom</div></div>
  `;

  // Winner boxes
  document.getElementById('summary-winner').innerHTML = `
    <div class="winner-box">
      <div class="winner-label">◆ Most Significant</div>
      <div class="winner-name">${topWinner[0]}</div>
      <div class="winner-pct">${topWinner[1]} group${topWinner[1]!==1?'s':''} · ${topPct}%</div>
    </div>
    <div class="winner-box bottom">
      <div class="winner-label">◇ Least Significant</div>
      <div class="winner-name">${botWinner[0]}</div>
      <div class="winner-pct">${botWinner[1]} group${botWinner[1]!==1?'s':''} · ${botPct}%</div>
    </div>
  `;

  // Reasons
  document.getElementById('reasons-list').innerHTML = topReasons.map(r=>`
    <div class="reason-item">
      <span class="reason-who">${r.name}</span>
      "${r.topReason}"
    </div>`).join('');

  // Charts
  const chartOpts = (horizontal) => ({
    indexAxis: horizontal ? 'y' : 'x',
    responsive: true, maintainAspectRatio: false,
    animation: { duration: 600 },
    plugins: { legend:{ display:false } },
    scales: {
      x: { ticks:{ color:SAND, font:{ size:10 }, stepSize:1 }, grid:{ color:'rgba(255,255,255,.07)' }, border:{ color:'rgba(255,255,255,.1)' } },
      y: { ticks:{ color:SAND, font:{ size:10 } }, grid:{ display:false }, border:{ display:false } },
    },
  });

  // Top chart
  if (topChartInst) topChartInst.destroy();
  topChartInst = new Chart(document.getElementById('top-chart'), {
    type: 'bar',
    data: {
      labels: topSorted.map(([k])=>k),
      datasets:[{ data:topSorted.map(([,v])=>v), backgroundColor:topSorted.map((_,i)=>i===0?GOLD:'rgba(201,168,76,.3)'), borderRadius:3 }]
    },
    options: chartOpts(true),
  });

  // Bot chart
  if (botChartInst) botChartInst.destroy();
  botChartInst = new Chart(document.getElementById('bot-chart'), {
    type: 'bar',
    data: {
      labels: botSorted.map(([k])=>k),
      datasets:[{ data:botSorted.map(([,v])=>v), backgroundColor:botSorted.map((_,i)=>i===0?TERRA:'rgba(193,68,14,.3)'), borderRadius:3 }]
    },
    options: chartOpts(true),
  });
}

goTo(0);
load();
setInterval(load, 30000);
resetAuto();
</script>
</body>
</html>
